function ChartPanel() {
  const LC = typeof LightweightCharts !== 'undefined' ? LightweightCharts : null;

  // ── Default indicator state ────────────────────────────────────────────────
  const DEFAULT_TOGGLES = { rsi:true, ema:true, fib:false, macd:true, vwap:false, vcad:false };
  const DEFAULT_PARAMS  = { rsiPeriod:14, emaFast:50, emaSlow:200,
                            macdFast:12, macdSlow:26, macdSignal:9,
                            fibLookback:50, minSignalStrength:3 };

  // ── Refs ──────────────────────────────────────────────────────────────────
  const containerRef    = useRef(null);
  const chartRef        = useRef(null);
  const candleRef       = useRef(null);
  const plRef           = useRef(null);
  const ema50Ref        = useRef(null);
  const ema200Ref       = useRef(null);
  const vwapRef         = useRef(null);
  const vwapUB1Ref      = useRef(null);
  const vwapLB1Ref      = useRef(null);
  const vwapUB2Ref      = useRef(null);
  const vwapLB2Ref      = useRef(null);
  const fibLinesRef     = useRef([]);
  const rsiContainerRef = useRef(null);
  const rsiChartRef     = useRef(null);
  const rsiSerRef       = useRef(null);
  const macdContainerRef= useRef(null);
  const macdChartRef    = useRef(null);
  const macdHistRef     = useRef(null);
  const macdLineRef     = useRef(null);
  const macdSigRef      = useRef(null);
  const vcadContainerRef= useRef(null);
  const vcadChartRef    = useRef(null);
  const vcadSerRef      = useRef(null);
  const cacheRef        = useRef({ M1:[], M5:[], M15:[], H1:[] });
  const liveRef         = useRef({ M1:null, M5:null, M15:null, H1:null });
  const activeTfRef     = useRef('M5');
  const esRef           = useRef(null);
  const indDataRef      = useRef(null);
  const togglesRef      = useRef(DEFAULT_TOGGLES);
  const paramsRef       = useRef(DEFAULT_PARAMS);
  const syncUnsub       = useRef([]);
  const posTPLineRef    = useRef(null);
  const posSLLineRef    = useRef(null);
  const posEntryLineRef = useRef(null);
  const posRef          = useRef(null);
  const isDraggingRef   = useRef(false);
  const dragFieldRef    = useRef(null); // 'tp' | 'sl' | 'entry'

  // ── State ──────────────────────────────────────────────────────────────────
  const [activeTf,     _setActiveTf]   = useState('M5');
  const [ohlcByTf,     setOhlcByTf]   = useState({});
  const [streamStatus, setStreamStatus]= useState('disconnected');
  const [lastTick,     setLastTick]    = useState('');
  const [loading,      setLoading]     = useState(true);
  const [error,        setError]       = useState(null);
  const [indicators,   setIndicators]  = useState(() => {
    try { return {...DEFAULT_TOGGLES, ...JSON.parse(localStorage.getItem('ind_toggles') || '{}')}; }
    catch { return DEFAULT_TOGGLES; }
  });
  const [indParams,    setIndParams]   = useState(() => {
    try { return {...DEFAULT_PARAMS, ...JSON.parse(localStorage.getItem('ind_params') || '{}')}; }
    catch { return DEFAULT_PARAMS; }
  });
  const [showSettings, setShowSettings]= useState(false);
  const [settingsTab,  setSettingsTab] = useState('toggles');
  const [rsiDisp,      setRsiDisp]     = useState(null);
  const [macdDisp,     setMacdDisp]    = useState({ ml:null, sl:null, hs:null });
  const [priceInfo,    setPriceInfo]   = useState({ price:null, change:0, changePct:0, dir:'flat' });
  const dayOpenRef = useRef(null);
  // ── Position tracker ─────────────────────────────────────────────────────
  const [position,     setPosition]    = useState(() => {
    try { return JSON.parse(localStorage.getItem('chart_pos') || 'null'); } catch { return null; }
  });
  const [posYCoords,   setPosYCoords]  = useState({ tp:null, sl:null, entry:null });
  const [openPnl,      setOpenPnl]     = useState(0);
  const [showPosModal, setShowPosModal]= useState(false);
  const [posForm,      setPosForm]     = useState({ dir:'long', entry:'', tp:'', sl:'', qty:'1' });

  function setActiveTf(tf) { activeTfRef.current = tf; _setActiveTf(tf); }

  // Keep refs in sync with state for use inside closures
  useEffect(() => { togglesRef.current = indicators; }, [indicators]);
  useEffect(() => { paramsRef.current  = indParams;  }, [indParams]);

  // ── Position tracker: keep posRef in sync + draw price lines ───────────────
  useEffect(() => {
    posRef.current = position;
    try { localStorage.setItem('chart_pos', JSON.stringify(position)); } catch {}
    if (isDraggingRef.current) return; // skip line redraw during live drag
    if (!candleRef.current) return;
    // Remove old lines
    [posTPLineRef, posSLLineRef, posEntryLineRef].forEach(r => {
      if (r.current) { try { candleRef.current.removePriceLine(r.current); } catch {} r.current = null; }
    });
    if (!position || !LC) return;
    const LS = LC.LineStyle;
    posEntryLineRef.current = candleRef.current.createPriceLine({
      price: position.entry, color: '#2196F3', lineWidth: 1,
      lineStyle: LS ? LS.Dashed : 1, axisLabelVisible: false,
      title: '',
    });
    posTPLineRef.current = candleRef.current.createPriceLine({
      price: position.tp, color: '#26a69a', lineWidth: 1,
      lineStyle: LS ? LS.Solid : 0, axisLabelVisible: false,
      title: '',
    });
    posSLLineRef.current = candleRef.current.createPriceLine({
      price: position.sl, color: '#ef5350', lineWidth: 1,
      lineStyle: LS ? LS.Solid : 0, axisLabelVisible: false,
      title: '',
    });
  }, [position]);

  // ── Drag handler for TV-style draggable price lines ───────────────────────
  function startPriceDrag(e, field) {
    e.preventDefault();
    e.stopPropagation();
    isDraggingRef.current = true;
    dragFieldRef.current  = field;

    function onMove(ev) {
      if (!dragFieldRef.current || !candleRef.current || !containerRef.current) return;
      const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
      const rect    = containerRef.current.getBoundingClientRect();
      const y       = clientY - rect.top;
      const price   = candleRef.current.coordinateToPrice(y);
      if (price == null || price <= 0) return;
      const p = Math.round(price * 100) / 100;
      setPosition(prev => {
        if (!prev) return prev;
        const next = { ...prev, [dragFieldRef.current]: p };
        posRef.current = next;
        return next;
      });
      _updatePosCoords();
    }

    function onUp() {
      isDraggingRef.current = false;
      dragFieldRef.current  = null;
      // Commit: redraw the price lines now drag is done
      setPosition(prev => prev ? { ...prev } : prev);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup',   onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend',  onUp);
    }

    window.addEventListener('mousemove', onMove, { passive:false });
    window.addEventListener('mouseup',   onUp);
    window.addEventListener('touchmove', onMove, { passive:false });
    window.addEventListener('touchend',  onUp);
  }

  // ── Update Y-coordinates for position overlay boxes ───────────────────────
  function _updatePosCoords() {
    const pos = posRef.current;
    if (!pos || !candleRef.current) return;
    try {
      const tpY    = candleRef.current.priceToCoordinate(pos.tp);
      const slY    = candleRef.current.priceToCoordinate(pos.sl);
      const entryY = candleRef.current.priceToCoordinate(pos.entry);
      setPosYCoords({ tp: tpY, sl: slY, entry: entryY });
    } catch {}
  }

  // ── Chart creation (once on mount) ─────────────────────────────────────────
  useEffect(() => {
    if (!containerRef.current || !LC) { setError('Chart library not loaded.'); setLoading(false); return; }

    const CHART_OPTS = (height, hideTime = false) => ({
      autoSize: true,
      layout: { background: { color:'#131722' }, textColor:'#b2b5be' },
      grid:   { vertLines:{ color:'#1e222d' }, horzLines:{ color:'#1e222d' } },
      crosshair: { mode: LC.CrosshairMode.Normal },
      rightPriceScale: { borderColor:'#2a2e39' },
      timeScale: { borderColor:'#2a2e39', timeVisible:!hideTime, secondsVisible:false, visible:!hideTime },
      handleScroll: true, handleScale: true,
    });

    // Main chart
    const chart  = LC.createChart(containerRef.current, CHART_OPTS(0));
    const series = chart.addCandlestickSeries({
      upColor:'#26a69a', downColor:'#ef5350',
      borderUpColor:'#26a69a', borderDownColor:'#ef5350',
      wickUpColor:'#26a69a', wickDownColor:'#ef5350',
    });
    chart.subscribeCrosshairMove(param => {
      if (param.seriesData && param.seriesData.has(series)) {
        const d = param.seriesData.get(series);
        if (d) setOhlcByTf(p => ({ ...p, [activeTfRef.current]: d }));
      }
      _updatePosCoords();
    });
    chart.timeScale().subscribeVisibleTimeRangeChange(() => _updatePosCoords());
    // EMA series on main chart
    const e50  = chart.addLineSeries({ color:'#2196F3', lineWidth:1, title:'EMA50',  lastValueVisible:false, priceLineVisible:false });
    const e200 = chart.addLineSeries({ color:'#FF6D00', lineWidth:2, title:'EMA200', lastValueVisible:false, priceLineVisible:false });
    // VWAP series on main chart
    const vw   = chart.addLineSeries({ color:'#FF6D00', lineWidth:2, title:'VWAP',   lastValueVisible:false, priceLineVisible:false });
    const vub1 = chart.addLineSeries({ color:'#ef5350', lineWidth:1, lineStyle:2,    lastValueVisible:false, priceLineVisible:false });
    const vlb1 = chart.addLineSeries({ color:'#26a69a', lineWidth:1, lineStyle:2,    lastValueVisible:false, priceLineVisible:false });
    const vub2 = chart.addLineSeries({ color:'rgba(239,83,80,.4)', lineWidth:1, lineStyle:2, lastValueVisible:false, priceLineVisible:false });
    const vlb2 = chart.addLineSeries({ color:'rgba(38,166,154,.4)', lineWidth:1, lineStyle:2, lastValueVisible:false, priceLineVisible:false });

    chartRef.current = chart; candleRef.current = series;
    ema50Ref.current = e50;  ema200Ref.current = e200;
    vwapRef.current  = vw;   vwapUB1Ref.current = vub1; vwapLB1Ref.current = vlb1;
    vwapUB2Ref.current = vub2; vwapLB2Ref.current = vlb2;

    // RSI sub-chart
    if (rsiContainerRef.current) {
      const rc = LC.createChart(rsiContainerRef.current, {
        ...CHART_OPTS(0, true),
        rightPriceScale: { borderColor:'#2a2e39', scaleMargins:{ top:0.1, bottom:0.1 } },
      });
      const rs = rc.addLineSeries({ color:'#7b1fa2', lineWidth:2, lastValueVisible:false, priceLineVisible:false });
      rs.createPriceLine({ price:70, color:'rgba(239,83,80,.6)',  lineWidth:1, lineStyle:2, axisLabelVisible:true,  title:'70' });
      rs.createPriceLine({ price:50, color:'rgba(120,123,134,.4)',lineWidth:1, lineStyle:2, axisLabelVisible:false, title:'50' });
      rs.createPriceLine({ price:30, color:'rgba(38,166,154,.6)', lineWidth:1, lineStyle:2, axisLabelVisible:true,  title:'30' });
      rc.applyOptions({ watermark:{ visible:false } });
      rsiChartRef.current = rc; rsiSerRef.current = rs;
    }

    // MACD sub-chart
    if (macdContainerRef.current) {
      const mc   = LC.createChart(macdContainerRef.current, {
        ...CHART_OPTS(0, true),
        rightPriceScale: { borderColor:'#2a2e39', scaleMargins:{ top:0.15, bottom:0.15 } },
      });
      const mh   = mc.addHistogramSeries({ lastValueVisible:false, priceLineVisible:false });
      const ml   = mc.addLineSeries({ color:'#2196F3', lineWidth:1, lastValueVisible:false, priceLineVisible:false });
      const msl  = mc.addLineSeries({ color:'#FF6D00', lineWidth:1, lastValueVisible:false, priceLineVisible:false });
      mh.createPriceLine({ price:0, color:'rgba(120,123,134,.4)', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      macdChartRef.current = mc; macdHistRef.current = mh;
      macdLineRef.current  = ml; macdSigRef.current  = msl;
    }

    // VCAD sub-chart
    if (vcadContainerRef.current) {
      const vc  = LC.createChart(vcadContainerRef.current, {
        ...CHART_OPTS(0, true),
        rightPriceScale: { borderColor:'#2a2e39', scaleMargins:{ top:0.1, bottom:0.1 } },
      });
      const vs  = vc.addLineSeries({ color:'#7b1fa2', lineWidth:1, lastValueVisible:false, priceLineVisible:false });
      vs.createPriceLine({ price:0, color:'rgba(120,123,134,.4)', lineWidth:1, lineStyle:2, axisLabelVisible:false });
      vcadChartRef.current = vc; vcadSerRef.current = vs;
    }

    // Sync time ranges between all charts
    function syncRange(src, ...targets) {
      const us = src.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (!range) return;
        targets.forEach(t => { try { t && t.timeScale().setVisibleLogicalRange(range); } catch {} });
      });
      syncUnsub.current.push(us);
    }
    const subCharts = [rsiChartRef.current, macdChartRef.current, vcadChartRef.current].filter(Boolean);
    syncRange(chart, ...subCharts);
    subCharts.forEach(sc => syncRange(sc, chart, ...subCharts.filter(x => x !== sc)));

    return () => {
      syncUnsub.current.forEach(u => { try { u && u(); } catch {} });
      [chart, rsiChartRef.current, macdChartRef.current, vcadChartRef.current].forEach(c => {
        try { c && c.remove(); } catch {}
      });
      chartRef.current = candleRef.current = null;
      rsiChartRef.current = rsiSerRef.current = null;
      macdChartRef.current = macdHistRef.current = macdLineRef.current = macdSigRef.current = null;
      vcadChartRef.current = vcadSerRef.current = null;
    };
  }, []);

  // ── Helper: build lightweight-charts data arrays from indicator results ──────
  function _buildIndData(candles, data) {
    if (!candles || !data) return;
    const n = candles.length;

    // EMA series
    const e50Data  = [], e200Data = [];
    for (let i = 0; i < n; i++) {
      if (data.ema50[i]  !== null) e50Data.push({ time:candles[i].time, value:data.ema50[i] });
      if (data.ema200[i] !== null) e200Data.push({ time:candles[i].time, value:data.ema200[i] });
    }
    // VWAP series
    const vwData = [], ub1D = [], lb1D = [], ub2D = [], lb2D = [];
    for (let i = 0; i < n; i++) {
      const t = candles[i].time;
      if (data.vwap.vwap[i] !== null) {
        vwData.push({ time:t, value:data.vwap.vwap[i] });
        ub1D.push({ time:t, value:data.vwap.ub1[i] });
        lb1D.push({ time:t, value:data.vwap.lb1[i] });
        ub2D.push({ time:t, value:data.vwap.ub2[i] });
        lb2D.push({ time:t, value:data.vwap.lb2[i] });
      }
    }
    // RSI series
    const rsiData = [];
    for (let i = 0; i < n; i++) {
      if (data.rsi[i] !== null) rsiData.push({ time:candles[i].time, value:data.rsi[i] });
    }
    // MACD histogram + lines
    const histData = [], mlData = [], slData = [];
    for (let i = 0; i < n; i++) {
      const t = candles[i].time;
      const h = data.macd.histogram[i];
      const ml = data.macd.macdLine[i];
      const sl = data.macd.signalLine[i];
      if (h !== null) {
        const prev = i > 0 ? data.macd.histogram[i - 1] : null;
        let color;
        if (h >= 0) color = (prev === null || h >= prev) ? '#26a69a' : 'rgba(38,166,154,.5)';
        else        color = (prev === null || h <= prev) ? '#ef5350' : 'rgba(239,83,80,.5)';
        histData.push({ time:t, value:h, color });
      }
      if (ml !== null) mlData.push({ time:t, value:ml });
      if (sl !== null) slData.push({ time:t, value:sl });
    }
    // VCAD series
    const vcadData = [];
    for (let i = 0; i < n; i++) {
      if (data.vcad[i] !== null) vcadData.push({ time:candles[i].time, value:data.vcad[i] });
    }
    return { e50Data, e200Data, vwData, ub1D, lb1D, ub2D, lb2D, rsiData, histData, mlData, slData, vcadData };
  }

  // ── Render all indicators for current data ─────────────────────────────────
  function _renderIndicators(candles, data, builtData) {
    if (!candleRef.current || !data) return;
    const tg = togglesRef.current;
    const bd = builtData || _buildIndData(candles, data);
    if (!bd) return;

    // EMA
    try {
      ema50Ref.current.applyOptions({ visible: tg.ema });
      ema200Ref.current.applyOptions({ visible: tg.ema });
      if (tg.ema) {
        ema50Ref.current.setData(bd.e50Data);
        ema200Ref.current.setData(bd.e200Data);
        // Golden/Death cross markers
        _checkEMACrossMarkers(candles, data.ema50, data.ema200);
      }
    } catch(e) {}

    // VWAP
    try {
      [vwapRef,vwapUB1Ref,vwapLB1Ref,vwapUB2Ref,vwapLB2Ref].forEach(r => r.current && r.current.applyOptions({ visible: tg.vwap }));
      if (tg.vwap && bd.vwData.length) {
        vwapRef.current.setData(bd.vwData);
        vwapUB1Ref.current.setData(bd.ub1D);
        vwapLB1Ref.current.setData(bd.lb1D);
        vwapUB2Ref.current.setData(bd.ub2D);
        vwapLB2Ref.current.setData(bd.lb2D);
      }
    } catch(e) {}

    // Fibonacci price lines
    try {
      fibLinesRef.current.forEach(pl => { try { candleRef.current.removePriceLine(pl); } catch {} });
      fibLinesRef.current = [];
      if (tg.fib && data.fib) {
        const fibColors = { 0:'#787B86', 0.236:'#F23645', 0.382:'#FF9800', 0.5:'#4CAF50',
                            0.618:'#2196F3', 0.786:'#9C27B0', 1.0:'#787B86', 1.272:'#26a69a', 1.618:'#ef5350' };
        data.fib.forEach(lv => {
          const pl = candleRef.current.createPriceLine({
            price: lv.price, color: fibColors[lv.level] || '#888',
            lineWidth: lv.level === 0.618 ? 2 : 1, lineStyle: 2,
            axisLabelVisible: true, title: lv.label,
          });
          fibLinesRef.current.push(pl);
        });
      }
    } catch(e) {}

    // Long/Short signal markers
    try {
      if (tg.ls && data.signals && data.signals.length) {
        const markers = data.signals.map(s => ({
          time: s.time,
          position: s.direction === 'long' ? 'belowBar' : 'aboveBar',
          color:    s.direction === 'long'
            ? (s.score === 5 ? '#00E676' : '#26a69a')
            : (s.score === 5 ? '#FF1744' : '#ef5350'),
          shape:    s.direction === 'long' ? 'arrowUp' : 'arrowDown',
          text:     s.direction === 'long' ? 'L' : 'S',
          size: s.score >= 5 ? 2 : 1,
        }));
        candleRef.current.setMarkers(markers.sort((a,b) => a.time - b.time));
        setSignalLog(data.signals.slice(-20).reverse());
      } else {
        candleRef.current.setMarkers([]);
        if (!tg.ls) setSignalLog([]);
      }
    } catch(e) {}

    // RSI sub-chart
    try {
      if (rsiSerRef.current && bd.rsiData.length) {
        rsiSerRef.current.setData(bd.rsiData);
        const last = bd.rsiData[bd.rsiData.length - 1];
        if (last) setRsiDisp(last.value);
      }
    } catch(e) {}

    // MACD sub-chart
    try {
      if (macdHistRef.current && bd.histData.length) {
        macdHistRef.current.setData(bd.histData);
        macdLineRef.current.setData(bd.mlData);
        macdSigRef.current.setData(bd.slData);
        const lastH = bd.histData[bd.histData.length - 1];
        const lastM = bd.mlData[bd.mlData.length - 1];
        const lastS = bd.slData[bd.slData.length - 1];
        setMacdDisp({ ml: lastM?.value, sl: lastS?.value, hs: lastH?.value });
      }
    } catch(e) {}

    // VCAD sub-chart
    try {
      if (vcadSerRef.current && bd.vcadData.length) vcadSerRef.current.setData(bd.vcadData);
    } catch(e) {}
  }

  // ── EMA cross marker detection ──────────────────────────────────────────────
  function _checkEMACrossMarkers(candles, ema50, ema200) {
    if (!candleRef.current) return;
    const crosses = [];
    for (let i = 1; i < candles.length; i++) {
      if (ema50[i] === null || ema200[i] === null || ema50[i-1] === null || ema200[i-1] === null) continue;
      const wasBelowOrEqual = ema50[i-1] <= ema200[i-1];
      const isAbove         = ema50[i]   >  ema200[i];
      const wasAboveOrEqual = ema50[i-1] >= ema200[i-1];
      const isBelow         = ema50[i]   <  ema200[i];
      if (wasBelowOrEqual && isAbove) crosses.push({ time:candles[i].time, position:'belowBar', color:'#FFD700', shape:'circle', text:'G', size:2 });
      if (wasAboveOrEqual && isBelow) crosses.push({ time:candles[i].time, position:'aboveBar', color:'#FF1744', shape:'circle', text:'D', size:2 });
    }
    // Merge with signal markers — use separate overlay series approach
    // For simplicity, add cross circles as separate line series markers
    // (We'll just log them; full marker merge handled in _renderIndicators L/S path)
  }

  // ── Price line helper ───────────────────────────────────────────────────────
  function _updatePriceLine(price) {
    if (!candleRef.current) return;
    try {
      if (plRef.current) candleRef.current.removePriceLine(plRef.current);
      plRef.current = candleRef.current.createPriceLine({
        price, color:'#10a37f', lineWidth:1, lineStyle:2, axisLabelVisible:true,
      });
    } catch {}
  }

  // ── TF switch ─────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!chartRef.current || !candleRef.current) return;
    chartRef.current.applyOptions({ watermark:{ visible:true, fontSize:28, color:'rgba(255,255,255,.06)', horzAlign:'center', vertAlign:'center', text:`XAUUSD · ${TF_LABELS[activeTf]}` }});
    const hist = cacheRef.current[activeTf] || [];
    if (!hist.length) return;
    try {
      // Clear existing fib lines
      fibLinesRef.current.forEach(pl => { try { candleRef.current.removePriceLine(pl); } catch {} });
      fibLinesRef.current = [];
      candleRef.current.setMarkers([]);
      candleRef.current.setData(hist);
      const live = liveRef.current[activeTf];
      if (live) { try { candleRef.current.update(live); } catch {} }
      const last = live || hist[hist.length - 1];
      _updatePriceLine(last.close);
      setOhlcByTf(p => ({ ...p, [activeTf]: last }));
      // Recalculate indicators for new TF
      const allCandles = live ? [...hist, live] : hist;
      const iData = IndicatorEngine.calculate(allCandles, paramsRef.current);
      indDataRef.current = iData;
      _renderIndicators(allCandles, iData);
    } catch(e) { console.warn('TF switch err:', e); }
  }, [activeTf]);

  // ── Re-render when indicator toggles change ─────────────────────────────────
  useEffect(() => {
    const candles = cacheRef.current[activeTfRef.current] || [];
    if (!indDataRef.current || !candles.length) return;
    const live = liveRef.current[activeTfRef.current];
    const all  = live ? [...candles, live] : candles;
    _renderIndicators(all, indDataRef.current);
    // Persist toggles
    try { localStorage.setItem('ind_toggles', JSON.stringify(indicators)); } catch {}
  }, [indicators]);

  // ── Re-render when params change ────────────────────────────────────────────
  useEffect(() => {
    const candles = cacheRef.current[activeTfRef.current] || [];
    if (!candles.length || !candleRef.current) return;
    const live = liveRef.current[activeTfRef.current];
    const all  = live ? [...candles, live] : candles;
    const iData = IndicatorEngine.calculate(all, paramsRef.current);
    indDataRef.current = iData;
    _renderIndicators(all, iData);
    try { localStorage.setItem('ind_params', JSON.stringify(indParams)); } catch {}
  }, [indParams]);

  // ── SSE stream ───────────────────────────────────────────────────────────
  useEffect(() => {
    let active = true, reconnTimer = null, es = null;

    function connect() {
      if (!active) return;
      setStreamStatus('reconnecting');
      es = new EventSource('/api/stream/all');
      esRef.current = es;

      es.onopen = () => setStreamStatus('connected');
      es.onerror = () => {
        es.close();
        if (active) reconnTimer = setTimeout(connect, 3000);
      };

      es.onmessage = evt => {
        if (!active) return;
        try { handleMsg(JSON.parse(evt.data)); } catch {}
      };
    }

    function handleMsg(msg) {
      const type = msg.type;

      if (type === 'init') {
        const candles = msg.candles || {};
        TF_LIST.forEach(tf => {
          if (candles[tf] && candles[tf].length) cacheRef.current[tf] = candles[tf];
        });
        const hist = cacheRef.current[activeTfRef.current] || [];
        if (hist.length && candleRef.current) {
          try {
            fibLinesRef.current.forEach(pl => { try { candleRef.current.removePriceLine(pl); } catch {} });
            fibLinesRef.current = [];
            candleRef.current.setMarkers([]);
            candleRef.current.setData(hist);
            const last = hist[hist.length - 1];
            _updatePriceLine(last.close);
            setOhlcByTf(p => ({ ...p, [activeTfRef.current]: last }));
          } catch {}
          // Compute indicators
          const iData = IndicatorEngine.calculate(hist, paramsRef.current);
          indDataRef.current = iData;
          _renderIndicators(hist, iData);
        }
        // Extract day open from M1 candles (first candle of today UTC)
        try {
          const m1 = cacheRef.current['M1'] || [];
          if (m1.length) {
            const todayStart = new Date(); todayStart.setUTCHours(0,0,0,0);
            const todayTs = todayStart.getTime() / 1000;
            const todayCandle = m1.find(c => c.time >= todayTs) || m1[m1.length - 1];
            if (todayCandle) dayOpenRef.current = todayCandle.open;
            const last = cacheRef.current[activeTfRef.current];
            if (last && last.length) {
              const lc = last[last.length - 1];
              const chg = dayOpenRef.current ? lc.close - dayOpenRef.current : 0;
              const chgPct = dayOpenRef.current ? (chg / dayOpenRef.current) * 100 : 0;
              setPriceInfo({ price:lc.close, change:chg, changePct:chgPct, dir: chg > 0 ? 'up' : chg < 0 ? 'dn' : 'flat' });
            }
          }
        } catch {}
        setLoading(false);
      }

      else if (type === 'candle') {
        const { timeframe: tf, candle } = msg;
        if (!tf || !candle) return;
        const cache = cacheRef.current[tf];
        cache.push(candle);
        if (cache.length > 8000) cache.splice(0, cache.length - 8000);
        liveRef.current[tf] = candle;
        if (tf === activeTfRef.current && candleRef.current) {
          try {
            candleRef.current.update({ time:candle.time, open:candle.open, high:candle.high, low:candle.low, close:candle.close });
            _updatePriceLine(candle.close);
            setOhlcByTf(p => ({ ...p, [tf]: candle }));
          } catch {}
          // Full recalculate on candle close
          const all = [...cache, candle];
          const iData = IndicatorEngine.calculate(all, paramsRef.current);
          indDataRef.current = iData;
          _renderIndicators(all, iData);
        }
      }

      else if (type === 'tick') {
        const now = new Date();
        setLastTick(now.toTimeString().slice(0, 8));
        const all = msg.candles || {};
        TF_LIST.forEach(tf => {
          const c = all[tf];
          if (!c) return;
          liveRef.current[tf] = c;
          if (tf === activeTfRef.current && candleRef.current) {
            try {
              candleRef.current.update({ time:c.time, open:c.open, high:c.high, low:c.low, close:c.close });
              _updatePriceLine(c.close);
              setOhlcByTf(p => ({ ...p, [tf]: c }));
            } catch {}
            // Update live price display
            try {
              const chg = dayOpenRef.current ? c.close - dayOpenRef.current : 0;
              const chgPct = dayOpenRef.current ? (chg / dayOpenRef.current) * 100 : 0;
              setPriceInfo({ price:c.close, change:chg, changePct:chgPct, dir: chg > 0 ? 'up' : chg < 0 ? 'dn' : 'flat' });
            } catch {}
            // Update position P&L
            try {
              const pos = posRef.current;
              if (pos) {
                const mult = pos.dir === 'long' ? 1 : -1;
                setOpenPnl((c.close - pos.entry) * pos.qty * mult);
                _updatePosCoords();
              }
            } catch {}
            // Fast incremental update — only last indicator values
            if (indDataRef.current) _updateLastIndicatorValues(c);
          }
        });
        setStreamStatus('connected');
      }

      else if (type === 'status') {
        setStreamStatus(msg.status || 'disconnected');
      }
    }

    // Fast per-tick update — only recalculate last point
    function _updateLastIndicatorValues(liveCandle) {
      const data = indDataRef.current;
      if (!data) return;
      const cache   = cacheRef.current[activeTfRef.current] || [];
      if (!cache.length) return;
      const closes  = [...cache.map(c => c.close), liveCandle.close];
      const n       = closes.length;

      // EMA last point
      if (togglesRef.current.ema) {
        try {
          const k50  = 2 / (paramsRef.current.emaFast + 1);
          const k200 = 2 / (paramsRef.current.emaSlow + 1);
          const prev50  = data.ema50[data.ema50.length - 1];
          const prev200 = data.ema200[data.ema200.length - 1];
          if (prev50  !== null) { const v = liveCandle.close * k50  + prev50  * (1 - k50);  try { ema50Ref.current  && ema50Ref.current.update({ time:liveCandle.time, value:v }); } catch {} }
          if (prev200 !== null) { const v = liveCandle.close * k200 + prev200 * (1 - k200); try { ema200Ref.current && ema200Ref.current.update({ time:liveCandle.time, value:v }); } catch {} }
        } catch {}
      }

      // VWAP last point
      if (togglesRef.current.vwap) {
        try {
          const lastV = data.vwap.vwap[data.vwap.vwap.length - 1];
          if (lastV !== null) { try { vwapRef.current && vwapRef.current.update({ time:liveCandle.time, value:lastV }); } catch {} }
        } catch {}
      }

      // RSI last point (Wilder's incremental)
      try {
        const rsiArr = data.rsi;
        const period = paramsRef.current.rsiPeriod;
        const lastRsi = rsiArr[rsiArr.length - 1];
        if (lastRsi !== null && cache.length >= period + 1) {
          const prevClose = cache[cache.length - 1].close;
          const diff = liveCandle.close - prevClose;
          // approximate: use last known avg gain/loss as proxy
          const oldRSI = lastRsi / 100;
          const approxAG = (100 - lastRsi) > 0 ? (lastRsi / (100 - lastRsi)) : 100;
          const gain = Math.max(diff, 0), loss = Math.max(-diff, 0);
          const newAG = (approxAG * (period - 1) + gain) / period;
          const newAL = (approxAG > 0 ? (newAG / (oldRSI)) * (1 - oldRSI) : 0) * (period - 1 + loss) / period;
          const newRsi = 100 - 100 / (1 + (newAL > 0 ? newAG / newAL : 100));
          if (rsiSerRef.current && !isNaN(newRsi)) {
            try { rsiSerRef.current.update({ time:liveCandle.time, value:Math.max(0, Math.min(100, newRsi)) }); } catch {}
            setRsiDisp(Math.max(0, Math.min(100, newRsi)));
          }
        }
      } catch {}

      // MACD last point (fast approximation)
      try {
        if (macdHistRef.current && data.macd.histogram.length > 0) {
          const lastH = data.macd.histogram[data.macd.histogram.length - 1];
          const prev  = data.macd.histogram[data.macd.histogram.length - 2];
          if (lastH !== null) {
            const color = lastH >= 0
              ? (prev === null || lastH >= prev ? '#26a69a' : 'rgba(38,166,154,.5)')
              : (prev === null || lastH <= prev ? '#ef5350' : 'rgba(239,83,80,.5)');
            try { macdHistRef.current.update({ time:liveCandle.time, value:lastH, color }); } catch {}
            const lastM = data.macd.macdLine[data.macd.macdLine.length - 1];
            const lastS = data.macd.signalLine[data.macd.signalLine.length - 1];
            if (lastM !== null) { try { macdLineRef.current && macdLineRef.current.update({ time:liveCandle.time, value:lastM }); } catch {} }
            if (lastS !== null) { try { macdSigRef.current  && macdSigRef.current.update({ time:liveCandle.time, value:lastS });  } catch {} }
            setMacdDisp({ ml:lastM, sl:lastS, hs:lastH });
          }
        }
      } catch {}
    }

    connect();
    return () => {
      active = false;
      clearTimeout(reconnTimer);
      if (esRef.current) { esRef.current.close(); esRef.current = null; }
    };
  }, []);

  // ── Render ─────────────────────────────────────────────────────────────────
  function fmtP(v) { return v != null ? Number(v).toFixed(2) : '—'; }
  function fmtI(v) { return v != null ? Number(v).toFixed(1) : '—'; }

  const currOhlc    = ohlcByTf[activeTf];
  const statusLabel = streamStatus === 'connected' ? 'LIVE'
    : streamStatus === 'reconnecting' ? 'Sync…' : 'Offline';

  function toggleInd(key) {
    setIndicators(prev => {
      const next = { ...prev, [key]: !prev[key] };
      try { localStorage.setItem('ind_toggles', JSON.stringify(next)); } catch {}
      return next;
    });
  }

  function handleParamChange(key, val) {
    const n = parseInt(val, 10);
    if (isNaN(n) || n < 1) return;
    setIndParams(prev => {
      const next = { ...prev, [key]: n };
      try { localStorage.setItem('ind_params', JSON.stringify(next)); } catch {}
      return next;
    });
  }

  const rsiColor = rsiDisp === null ? 'var(--muted)' : rsiDisp > 70 ? '#ef5350' : rsiDisp < 30 ? '#26a69a' : 'var(--text)';

  return (
    <div style={{ display:'flex', flexDirection:'column', background:'#131722', height:'calc(100vh - 52px)', overflow:'hidden' }}>

      {/* ── Symbol Info Bar ── */}
      <div className="tv-symbar">
        <span className="tv-sym-name">XAU/USD</span>
        <span className="tv-sym-ex">OANDA · GOLD</span>
        {priceInfo.price !== null && (
          <>
            <span className="tv-price">{fmtP(priceInfo.price)}</span>
            <span className={`tv-change ${priceInfo.dir}`}>
              {priceInfo.dir === 'up' ? '▲' : priceInfo.dir === 'dn' ? '▼' : '●'}
              {' '}{priceInfo.change >= 0 ? '+' : ''}{fmtP(priceInfo.change)}
              {' '}({priceInfo.changePct >= 0 ? '+' : ''}{fmt(priceInfo.changePct, 2)}%)
            </span>
          </>
        )}
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:8 }}>
          <div className="tv-live-wrap">
            <span className={`tv-live-dot ${streamStatus}`} />
            <span className="tv-live-lbl">{statusLabel}</span>
            {lastTick && <span style={{ fontSize:10, color:'#555', marginLeft:4, fontFamily:'monospace' }}>{lastTick}</span>}
          </div>
        </div>
      </div>

      {/* ── Professional Toolbar ── */}
      <div className="tv-tbar">
        {TF_LIST.map(tf => (
          <button key={tf} className={`tv-tf-btn${activeTf === tf ? ' active' : ''}`} onClick={() => setActiveTf(tf)}>
            {TF_LABELS[tf]}
          </button>
        ))}
        <div className="tv-sep" />
        <button className={`tv-ind-btn${indicators.rsi  ? ' on' : ''}`}  onClick={() => toggleInd('rsi')}>
          <IcoRSI />RSI
        </button>
        <button className={`tv-ind-btn${indicators.ema  ? ' on' : ''}`}  onClick={() => toggleInd('ema')}>
          <IcoEMA />EMA
        </button>
        <button className={`tv-ind-btn${indicators.fib  ? ' on-r' : ''}`} onClick={() => toggleInd('fib')}>
          <IcoFIB />FIB
        </button>
        <button className={`tv-ind-btn${indicators.macd ? ' on' : ''}`}  onClick={() => toggleInd('macd')}>
          <IcoMACD />MACD
        </button>
        <button className={`tv-ind-btn${indicators.vwap ? ' on-g' : ''}`} onClick={() => toggleInd('vwap')}>
          <IcoVWAP />VWAP
        </button>
        <button className={`tv-ind-btn${indicators.vcad ? ' on' : ''}`}  onClick={() => toggleInd('vcad')}>
          <IcoVCAD />VCAD
        </button>
        <div className="tv-sep" />
        <button
          className={`tv-pos-btn${position ? ' has-pos' : ''}`}
          title="Set TP / SL position"
          onClick={() => {
            if (!position) {
              const lastPrice = priceInfo.price;
              const ep = lastPrice ? lastPrice.toFixed(2) : '';
              const tpDef = lastPrice ? (lastPrice * 1.005).toFixed(2) : '';
              const slDef = lastPrice ? (lastPrice * 0.995).toFixed(2) : '';
              setPosForm({ dir:'long', entry:ep, tp:tpDef, sl:slDef, qty:'1' });
            }
            setShowPosModal(true);
          }}
        >
          <IcoPos />TP/SL
        </button>
        {currOhlc && (
          <div className="tv-ohlc">
            <span className="tv-ohlc-item"><span className="tv-ohlc-lbl">O</span><span className="tv-ohlc-val">{fmtP(currOhlc.open)}</span></span>
            <span className="tv-ohlc-item"><span className="tv-ohlc-lbl" style={{color:'#26a69a'}}>H</span><span className="tv-ohlc-val" style={{color:'#26a69a'}}>{fmtP(currOhlc.high)}</span></span>
            <span className="tv-ohlc-item"><span className="tv-ohlc-lbl" style={{color:'#ef5350'}}>L</span><span className="tv-ohlc-val" style={{color:'#ef5350'}}>{fmtP(currOhlc.low)}</span></span>
            <span className="tv-ohlc-item"><span className="tv-ohlc-lbl">C</span><span className="tv-ohlc-val">{fmtP(currOhlc.close)}</span></span>
          </div>
        )}
        <button className="tv-gear" title="Indicator Settings" onClick={() => setShowSettings(true)}>
          <IcoGear />
        </button>
      </div>

      {/* ── Main Chart ── */}
      <div className="tv-chart-wrap">
        {loading && (
          <div className="tv-overlay">
            <div className="spin" style={{ width:28, height:28, borderWidth:3 }} />
            <span className="tv-overlay-msg">Loading 5-day history…</span>
          </div>
        )}
        {error && !loading && <div className="tv-err-msg">{error}</div>}
        <div ref={containerRef} style={{ width:'100%', height:'100%' }} />

        {/* ── TV-Style Draggable Position Overlay ── */}
        {position && (() => {
          const { tp, sl, entry, dir, qty } = position;
          const isLong  = dir === 'long';
          const { tp: tpY, sl: slY, entry: entryY } = posYCoords;

          const tpPct  = entry ? ((tp - entry)    / entry * 100 * (isLong?1:-1)) : 0;
          const slPct  = entry ? ((entry - sl)    / entry * 100 * (isLong?1:-1)) : 0;
          const tpAmt  = Math.abs((tp - entry)    * qty * (isLong?1:-1));
          const slAmt  = Math.abs((entry - sl)    * qty * (isLong?1:-1));
          const rr     = slAmt > 0 ? (tpAmt / slAmt).toFixed(2) : '∞';
          const pnlPos = openPnl >= 0;

          // Fill regions (clamp to visible range)
          const greenTop = tpY !== null && entryY !== null ? Math.min(tpY, entryY) : null;
          const greenH   = tpY !== null && entryY !== null ? Math.abs(tpY - entryY) : 0;
          const redTop   = slY !== null && entryY !== null ? Math.min(slY, entryY) : null;
          const redH     = slY !== null && entryY !== null ? Math.abs(slY - entryY) : 0;

          // Center info box: position between entry and tp (or sl if short)
          const topLine  = isLong ? (tpY ?? entryY ?? 0) : (slY ?? entryY ?? 0);
          const botLine  = isLong ? (entryY ?? 0) : (entryY ?? 0);
          const centerY  = ((topLine + botLine) / 2);

          return (
            <div className="tv-pos-drag-wrap">

              {/* Green fill: entry → TP */}
              {greenTop !== null && greenH > 0 && (
                <div className="tv-pos-fill" style={{ top:greenTop, height:greenH, background:'rgba(38,166,154,.12)' }} />
              )}
              {/* Red fill: entry → SL */}
              {redTop !== null && redH > 0 && (
                <div className="tv-pos-fill" style={{ top:redTop, height:redH, background:'rgba(239,83,80,.12)' }} />
              )}

              {/* ── TP line ── */}
              {tpY !== null && (
                <div className="tv-pos-line-row" style={{ top: tpY }}>
                  <div className="tv-pos-line" style={{ background:'#26a69a' }} />
                  {/* drag handle */}
                  <div className="tv-pos-handle" style={{ borderColor:'#26a69a' }}
                    onMouseDown={e => startPriceDrag(e, 'tp')} onTouchStart={e => startPriceDrag(e, 'tp')} />
                  {/* wide hit area */}
                  <div className="tv-pos-hit" onMouseDown={e => startPriceDrag(e, 'tp')} onTouchStart={e => startPriceDrag(e, 'tp')} />
                  {/* right-side label */}
                  <div className="tv-pos-rhs" style={{ background:'rgba(38,166,154,.92)', border:'1px solid #26a69a', color:'#fff', top:0 }}
                    onMouseDown={e => startPriceDrag(e, 'tp')} onTouchStart={e => startPriceDrag(e, 'tp')}>
                    <div className="tv-pos-rhs-price">Target: {tp.toFixed(2)}</div>
                    <div className="tv-pos-rhs-sub">+{Math.abs(tpPct).toFixed(3)}%  ·  +${tpAmt.toFixed(2)}</div>
                  </div>
                </div>
              )}

              {/* ── Entry line ── */}
              {entryY !== null && (
                <div className="tv-pos-line-row" style={{ top: entryY }}>

                  <input className="tv-pos-input" type="number" step="0.01"

              {/* Calculated stats */}

                  <div className="tv-pos-stat-lbl">TP Distance</div>

                  <div className="tv-pos-stat-val r">-{Math.abs(slPct).toFixed(3)}%</div>
                </div>
                <div className="tv-pos-stat">
                  <div className="tv-pos-stat-lbl">Max Profit</div>
                  <div className="tv-pos-stat-val g">+${tpAmt.toFixed(2)}</div>
                </div>
                <div className="tv-pos-stat">
                  <div className="tv-pos-stat-lbl">Max Loss</div>
                  <div className="tv-pos-stat-val r">-${slAmt.toFixed(2)}</div>
                </div>
                <div className="tv-pos-stat">
                  <div className="tv-pos-stat-lbl">Risk / Reward</div>
                  <div className="tv-pos-stat-val">{rr}</div>
                </div>
                <div className="tv-pos-stat">
                  <div className="tv-pos-stat-lbl">Direction</div>
                  <div className={`tv-pos-stat-val ${isLong?'g':'r'}`}>{isLong?'▲ LONG':'▼ SHORT'}</div>
                </div>
              </div>

              <div className="tv-pos-actions">
                <button className="tv-pos-cancel-btn" onClick={() => setShowPosModal(false)}>Cancel</button>
                {position && (
                  <button className="tv-pos-cancel-btn" style={{color:'#ef5350',borderColor:'#ef5350'}}
                    onClick={() => { setPosition(null); setShowPosModal(false); }}>
                    Close Position
                  </button>
                )}
                <button className="tv-pos-set-btn" onClick={savePos}>
                  {position ? 'Update' : 'Set Position'}

              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Settings Modal ── */}
      {showSettings && (
        <div className="settings-overlay" onClick={e => { if (e.target === e.currentTarget) setShowSettings(false); }}>
          <div className="settings-modal">
            <div className="settings-hd">

              <button className="settings-close" onClick={() => setShowSettings(false)}>✕</button>

              {['toggles','params'].map(t => (

                <div>

          </div>
        </div>
      )}

/* ── Live Signals Panel ─────────────────────────────────────────────────── */
function LiveSignalsPanel() {
  const [signals,   setSignals]   = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [filter,    setFilter]    = useState('ALL');   // ALL | BUY | SELL | WIN | LOSS | PENDING
  const [marking,   setMarking]   = useState(null);   // signal _id being marked
  const [markData,  setMarkData]  = useState({});     // {id: {outcome, exitPrice}}

  const load = useCallback(async () => {
    try {
      const r = await fetch('/signals?limit=100');
      const d = await r.json();
      setSignals(d.signals || []);
    } catch {}
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  // auto-refresh every 30s
  useEffect(() => {
    const id = setInterval(load, 30000);
    return () => clearInterval(id);
  }, [load]);

  async function handleMark(sig) {
    const md = markData[sig._id] || {};
    const outcome = md.outcome || 'WIN';
    const exitPrice = md.exitPrice ? parseFloat(md.exitPrice) : null;
    setMarking(sig._id);
    try {
      const r = await fetch(`/signals/${sig._id}/outcome`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ outcome, exit_price: exitPrice }),
      });
      if (r.ok) {
        setSignals(prev => prev.map(s =>
          s._id === sig._id ? { ...s, outcome, exit_price: exitPrice } : s
        ));
      }
    } catch {}
    setMarking(null);
  }

  function fmtTime(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
  }

  function fmtPrice(v) {
    if (v == null) return '-';
    return Number(v).toFixed(2);
  }

  const filtered = signals.filter(s => {
    if (filter === 'ALL')     return true;
    if (filter === 'BUY')     return s.direction === 'BUY';
    if (filter === 'SELL')    return s.direction === 'SELL';
    if (filter === 'WIN')     return s.outcome === 'WIN';
    if (filter === 'LOSS')    return s.outcome === 'LOSS';
    if (filter === 'PENDING') return !s.outcome;
    return true;
  });

  const counts = {
    ALL: signals.length,
    BUY: signals.filter(s => s.direction === 'BUY').length,
    SELL: signals.filter(s => s.direction === 'SELL').length,
    WIN: signals.filter(s => s.outcome === 'WIN').length,
    LOSS: signals.filter(s => s.outcome === 'LOSS').length,
    PENDING: signals.filter(s => !s.outcome).length,
  };

  const winCount  = counts.WIN;
  const lossCount = counts.LOSS;
  const closedTotal = winCount + lossCount;
  const liveWR = closedTotal > 0 ? ((winCount / closedTotal) * 100).toFixed(1) : null;

  return (
    <div className="card">
      <div className="sig-toolbar">
        <span className="sig-toolbar-title">
          Live Signals
          {liveWR !== null && (
            <span style={{ marginLeft: 10, fontWeight: 400, color: 'var(--muted)', fontSize: 12 }}>
              {winCount}W / {lossCount}L &nbsp;·&nbsp;
              <span style={{ color: parseFloat(liveWR) >= 50 ? 'var(--win)' : 'var(--loss)', fontWeight: 700 }}>
                {liveWR}% WR
              </span>
            </span>
          )}
        </span>
        {['ALL','BUY','SELL','WIN','LOSS','PENDING'].map(f => (
          <button key={f}
            className={`sig-filter-btn${filter === f ? ' active' : ''}`}
            onClick={() => setFilter(f)}>
            {f} {counts[f] > 0 ? `(${counts[f]})` : ''}
          </button>
        ))}
        <button className="sig-filter-btn" onClick={load} title="Refresh">&#8635;</button>
      </div>

      {loading ? (
        <div className="sig-empty">Loading signals…</div>
      ) : filtered.length === 0 ? (
        <div className="sig-empty">
          {signals.length === 0
            ? 'No signals yet — signals appear here once the bot generates a trade entry.'
            : `No signals match filter "${filter}".`}
        </div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <table className="sig-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Time (UTC)</th>
                <th>Dir</th>
                <th>Entry</th>
                <th>SL</th>
                <th>TP</th>
                <th>ATR</th>
                <th>Score</th>
                <th>Session</th>
                <th>Regime</th>
                <th>TG</th>
                <th>Outcome</th>
                <th>Exit</th>
                <th>Mark</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((s, i) => {
                const md = markData[s._id] || {};
                const isBusy = marking === s._id;
                return (
                  <tr key={s._id}>
                    <td style={{ color: 'var(--muted)' }}>{signals.length - signals.indexOf(s)}</td>
                    <td style={{ whiteSpace: 'nowrap', color: 'var(--muted)', fontSize: 11 }}>{fmtTime(s.sent_at)}</td>
                    <td className={s.direction === 'BUY' ? 'sig-dir-buy' : 'sig-dir-sell'}>{s.direction}</td>
                    <td><strong>{fmtPrice(s.entry_price)}</strong></td>
                    <td style={{ color: 'var(--loss)' }}>{fmtPrice(s.stop_loss)}</td>
                    <td style={{ color: 'var(--win)' }}>{fmtPrice(s.take_profit)}</td>
                    <td style={{ color: 'var(--muted)' }}>{fmtPrice(s.atr)}</td>
                    <td>{s.score}/{s.score_threshold}</td>
                    <td><span className="badge badge-gray" style={{ fontSize: 10 }}>{s.session}</span></td>
                    <td style={{ color: 'var(--muted)', fontSize: 11 }}>{s.market_regime}</td>
                    <td>
                      {s.telegram_sent
                        ? <span className="sig-tg-sent" title="Telegram sent">&#10003;</span>
                        : <span className="sig-tg-fail" title="Not sent">&#8212;</span>}
                    </td>
                    <td>
                      {s.outcome === 'WIN'  && <span className="sig-outcome-win">WIN</span>}
                      {s.outcome === 'LOSS' && <span className="sig-outcome-loss">LOSS</span>}
                      {s.outcome === 'BREAKEVEN' && <span className="sig-outcome-be">BE</span>}
                      {!s.outcome && <span className="sig-outcome-none">Pending</span>}
                    </td>
                    <td style={{ color: 'var(--muted)' }}>{fmtPrice(s.exit_price)}</td>
                    <td>
                      {!s.outcome && (
                        <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexWrap: 'wrap' }}>
                          <select
                            style={{ fontSize: 10, background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 4px' }}
                            value={md.outcome || 'WIN'}
                            onChange={e => setMarkData(prev => ({ ...prev, [s._id]: { ...md, outcome: e.target.value } }))}>
                            <option>WIN</option>
                            <option>LOSS</option>
                            <option>BREAKEVEN</option>
                          </select>
                          <input
                            type="number"
                            placeholder="Exit $"
                            style={{ width: 70, fontSize: 10, background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 5px' }}
                            value={md.exitPrice || ''}
                            onChange={e => setMarkData(prev => ({ ...prev, [s._id]: { ...md, exitPrice: e.target.value } }))}
                          />
                          <button className="sig-mark-btn" onClick={() => handleMark(s)} disabled={isBusy}>
                            {isBusy ? '…' : 'Save'}
                          </button>
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}


function App() {

    // Restore last backtest from localStorage on page load
    try {
      const saved = localStorage.getItem('sean0_last_backtest');
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });
  const [activeTab,      setActiveTab]      = useState('live');

  const handleBacktestComplete = useCallback((data) => {
    setBacktestResult(data);
    try { localStorage.setItem('sean0_last_backtest', JSON.stringify(data)); } catch {}
  }, []);

  // Load a historical report (from MongoDB) — merges into same state
  const handleHistoryLoad = useCallback((reportDoc) => {
    const result = {
      metrics:      reportDoc.metrics      || {},
      trades:       reportDoc.trades       || [],
      equity_curve: reportDoc.equity_curve || [],
      mongo_id:     reportDoc._id,
    };

    try { localStorage.setItem('sean0_last_backtest', JSON.stringify(result)); } catch {}

  }, []);

  useEffect(() => {
    const tick = () => {
      const now = new Date();
      setClock(now.toUTCString().slice(5, 22) + ' UTC');
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <div>
      {/* ── Header ── */}
      <header className="hdr">
        <div className="hdr-brand">
          <div className="hdr-dot" />
          SEAN0-ALGO
          <span style={{ color: 'var(--muted)', fontWeight: 400 }}>· XAUUSD</span>
        </div>

        {/* ── Nav Tabs — centered in header ── */}
        <nav className="hdr-nav">
          <button
            className={`nav-tab${activeTab === 'chart' ? ' active' : ''}`}
            onClick={() => setActiveTab('chart')}>
            <span className="nav-tab-icon">&#128200;</span>Chart
          </button>
          <button
            className={`nav-tab${activeTab === 'live' ? ' active' : ''}`}
            onClick={() => setActiveTab('live')}>
            <span className="nav-tab-icon">&#128251;</span>Live Bot
          </button>
          <button
            className={`nav-tab${activeTab === 'backtest' ? ' active' : ''}`}
            onClick={() => setActiveTab('backtest')}>
            <span className="nav-tab-icon">&#128202;</span>Backtest
          </button>
          <button
            className={`nav-tab${activeTab === 'signals' ? ' active' : ''}`}
            onClick={() => setActiveTab('signals')}>
            <span className="nav-tab-icon">&#9889;</span>Live Signals
          </button>
        </nav>

        <div className="hdr-meta">
          <span className="badge badge-gray">5m / 15m / 1H</span>
          <span className="badge badge-green">OANDA</span>
          <span style={{ fontFamily: 'monospace', fontSize: '12px' }}>{clock}</span>
        </div>
      </header>

      {/* ── Content ── */}

        {/* ── Chart Tab — full-height, minimal padding ── */}
        {activeTab === 'chart' && (
          <main className="main-chart">
            <ChartPanel />
          </main>
        )}

        {activeTab !== 'chart' && (
          <main className="main">

            {/* ── Live Bot Tab ── */}
            {activeTab === 'live' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <BotControlPanel />
                <LogsPanel />
              </div>
            )}

            {/* ── Backtest Tab ── */}
            {activeTab === 'backtest' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <BacktestPanel onBacktestComplete={handleBacktestComplete} initialResult={backtestResult} />
                <BacktestHistoryPanel onLoad={handleHistoryLoad} />
                <TradeHistoryPanel backtestResult={backtestResult} />
              </div>
            )}

            {/* ── Live Signals Tab ── */}
            {activeTab === 'signals' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <LiveSignalsPanel />
              </div>
            )}

          </main>
        )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
