<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEAN0-ALGO · Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #212121;
      --surface:      #2f2f2f;
      --surface-alt:  #383838;
      --border:       #424242;
      --text:         #ececec;
      --muted:        #8e8ea0;
      --accent:       #10a37f;
      --accent-dim:   rgba(16,163,127,.12);
      --win:          #10a37f;
      --win-dim:      rgba(16,163,127,.12);
      --loss:         #ef4444;
      --loss-dim:     rgba(239,68,68,.12);
      --warn:         #f59e0b;
      --radius:       10px;
      --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html, body          { height:100%; background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
    #root               { min-height:100vh; display:flex; flex-direction:column; }
    a                   { color:var(--accent); text-decoration:none; }

    /* ── Header ─────────────────────────────────── */
    .hdr                { display:flex; align-items:center; gap:0; padding:0 20px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:100; backdrop-filter:blur(8px); height:52px; flex-wrap:nowrap; }
    .hdr-brand          { display:flex; align-items:center; gap:9px; font-weight:600; font-size:14px; letter-spacing:-.01em; flex-shrink:0; margin-right:12px; }
    .hdr-dot            { width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent); animation:pulse 2.5s infinite; }
    .hdr-nav            { display:flex; align-items:center; gap:2px; flex:1; justify-content:center; }
    .hdr-meta           { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); flex-shrink:0; margin-left:12px; }

    /* ── Badges ─────────────────────────────────── */
    .badge              { padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
    .badge-green        { background:var(--accent-dim); color:var(--accent); }
    .badge-gray         { background:rgba(255,255,255,.07); color:var(--muted); }
    .badge-red          { background:var(--loss-dim); color:var(--loss); }

    /* ── Layout ──────────────────────────────────── */
    .main               { flex:1; padding:18px 20px 40px; max-width:1440px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:18px; }
    .main-chart         { flex:1; padding:12px 20px 16px; max-width:1440px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:0; }
    .grid2              { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media(max-width:900px){ .grid2{ grid-template-columns:1fr; } }

    /* ── Card ────────────────────────────────────── */
    .card               { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .card-hd            { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-bottom:1px solid var(--border); }
    .card-title         { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
    .card-body          { padding:18px; }

    /* ── Metrics grid ────────────────────────────── */
    .metrics-grid       { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    @media(max-width:700px){ .metrics-grid{ grid-template-columns:repeat(2,1fr); } }
    .mc                 { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:8px; padding:13px 14px; }
    .mc-label           { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; }
    .mc-value           { font-size:20px; font-weight:700; color:var(--text); line-height:1.2; }
    .mc-value.g         { color:var(--win); }
    .mc-value.r         { color:var(--loss); }
    .mc-sub             { font-size:11px; color:var(--muted); margin-top:3px; }

    /* ── Form ────────────────────────────────────── */
    .form-grid          { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
    @media(max-width:580px){ .form-grid{ grid-template-columns:1fr; } }
    .fg                 { display:flex; flex-direction:column; gap:6px; }
    .fg-label           { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:6px; }
    .fg-accent          { color:var(--accent); font-weight:700; text-transform:none; letter-spacing:0; }
    .input              { background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:8px 11px; font-size:13px; outline:none; transition:border-color .15s; width:100%; }
    .input:focus        { border-color:var(--accent); }
    input[type=range]   { -webkit-appearance:none; appearance:none; height:4px; background:var(--border); border-radius:2px; outline:none; cursor:pointer; accent-color:var(--accent); padding:0; border:none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--accent); cursor:pointer; }
    .slider-row         { display:flex; align-items:center; gap:10px; }
    .slider-val         { font-size:14px; font-weight:700; color:var(--accent); min-width:28px; text-align:right; }

    /* ── Button ──────────────────────────────────── */
    .btn                { display:inline-flex; align-items:center; gap:8px; padding:9px 20px; border-radius:7px; border:none; cursor:pointer; font-size:13px; font-weight:600; font-family:var(--font); transition:all .15s; }
    .btn-primary        { background:var(--accent); color:#fff; }
    .btn-primary:hover  { background:#0d9272; }
    .btn-primary:disabled{ opacity:.4; cursor:not-allowed; }
    .btn-ghost          { background:transparent; color:var(--muted); border:1px solid var(--border); }
    .btn-ghost:hover    { background:var(--surface-alt); color:var(--text); }
    .btn-sm             { padding:5px 11px; font-size:12px; }

    /* ── Spinner ─────────────────────────────────── */
    .spin               { width:13px; height:13px; border:2px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .65s linear infinite; display:inline-block; }
    @keyframes spin     { to{ transform:rotate(360deg); } }
    @keyframes pulse    { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }

    /* ── Divider ─────────────────────────────────── */
    .divider            { border:none; border-top:1px solid var(--border); margin:18px 0; }

    /* ── Trade Summary Banner ────────────────────── */
    .trade-summary      { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
    @media(max-width:640px){ .trade-summary{ grid-template-columns:repeat(2,1fr); } }
    .ts-block           { border-radius:9px; padding:14px 16px; display:flex; flex-direction:column; align-items:center; gap:4px; border:1px solid transparent; }
    .ts-block-total     { background:rgba(255,255,255,.04); border-color:var(--border); }
    .ts-block-win       { background:var(--win-dim); border-color:rgba(16,163,127,.25); }
    .ts-block-loss      { background:var(--loss-dim); border-color:rgba(239,68,68,.25); }
    .ts-block-rate      { background:rgba(16,163,127,.07); border-color:rgba(16,163,127,.18); }
    .ts-label           { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    .ts-num             { font-size:32px; font-weight:800; line-height:1; letter-spacing:-.02em; }
    .ts-num-total       { color:var(--text); }
    .ts-num-win         { color:var(--win); }
    .ts-num-loss        { color:var(--loss); }
    .ts-num-rate        { color:var(--accent); }
    .ts-sub             { font-size:11px; color:var(--muted); margin-top:1px; }

    /* ── Equity chart ────────────────────────────── */
    .chart-wrap         { background:rgba(0,0,0,.25); border-radius:7px; overflow:hidden; }
    .chart-empty        { height:150px; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; }

    /* ── Error / Info box ────────────────────────── */
    .err-box            { background:var(--loss-dim); border:1px solid rgba(239,68,68,.3); border-radius:6px; padding:10px 14px; color:var(--loss); font-size:12px; margin-top:12px; }
    .info-box           { padding:36px; text-align:center; color:var(--muted); font-size:13px; }

    /* ── Live logs ───────────────────────────────── */
    .log-list           { max-height:340px; overflow-y:auto; display:flex; flex-direction:column; gap:1px; }
    .log-list::-webkit-scrollbar{ width:4px; }
    .log-list::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }
    .log-row            { display:grid; grid-template-columns:148px 52px 1fr; gap:8px; align-items:baseline; padding:7px 12px; border-radius:6px; transition:background .1s; }
    .log-row:hover      { background:rgba(255,255,255,.03); }
    .log-ts             { color:var(--muted); font-family:monospace; font-size:11px; }
    .log-lvl            { font-size:10px; font-weight:700; padding:1px 6px; border-radius:4px; text-align:center; }
    .lvl-INFO           { background:rgba(255,255,255,.07); color:var(--muted); }
    .lvl-WARN           { background:rgba(245,158,11,.15); color:var(--warn); }
    .lvl-ERROR,.lvl-CRITICAL{ background:var(--loss-dim); color:var(--loss); }
    .log-msg            { color:var(--text); word-break:break-word; font-size:12.5px; }
    .log-msg.signal     { color:var(--win); font-weight:600; }
    .log-msg.err-txt    { color:var(--loss); }

    /* ── Live indicator ─────────────────────────── */
    .live-row           { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); }
    .dot-live           { width:6px; height:6px; border-radius:50%; background:var(--win); animation:pulse 2s infinite; }

    /* ── Table ───────────────────────────────────── */
    .tbl-wrap           { overflow-x:auto; max-height:380px; overflow-y:auto; }
    .tbl-wrap::-webkit-scrollbar{ width:4px; height:4px; }
    .tbl-wrap::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }
    table               { width:100%; border-collapse:collapse; font-size:12.5px; }
    thead th            { padding:9px 12px; text-align:left; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:1; white-space:nowrap; }
    tbody tr            { border-bottom:1px solid rgba(255,255,255,.04); transition:background .1s; }
    tbody tr:hover      { background:rgba(255,255,255,.03); }
    tbody td            { padding:8px 12px; white-space:nowrap; }
    .td-win             { color:var(--win); font-weight:600; }
    .td-loss            { color:var(--loss); font-weight:600; }
    .td-buy             { color:var(--win); font-weight:600; }
    .td-sell            { color:var(--loss); font-weight:600; }
    .td-mono            { font-family:monospace; font-size:12px; }
    .td-muted           { color:var(--muted); font-size:11px; }
    .td-pnl-pos         { color:var(--win); font-weight:700; font-family:monospace; font-size:12px; }
    .td-pnl-neg         { color:var(--loss); font-weight:700; font-family:monospace; font-size:12px; }

    /* ── Structured JSON log rows ──────────────────── */
    .log-json-row       { display:flex; align-items:center; flex-wrap:wrap; gap:6px; padding:7px 12px; border-radius:6px; font-size:12px; transition:background .1s; }
    .log-json-row:hover { background:rgba(255,255,255,.03); }
    .log-jts            { font-family:monospace; font-size:11px; color:var(--muted); min-width:90px; }
    .log-jdir           { font-size:11px; font-weight:700; padding:1px 8px; border-radius:4px; min-width:42px; text-align:center; }
    .log-jdir-buy       { background:var(--win-dim); color:var(--win); }
    .log-jdir-sell      { background:var(--loss-dim); color:var(--loss); }
    .log-jdir-none      { background:rgba(255,255,255,.07); color:var(--muted); }
    .log-chip           { font-size:10px; padding:1px 7px; border-radius:3px; font-weight:600; }
    .chip-session       { background:rgba(255,255,255,.07); color:var(--muted); }
    .chip-regime        { background:rgba(245,158,11,.12); color:var(--warn); }
    .chip-score         { background:rgba(255,255,255,.06); color:var(--muted); }
    .log-reason         { font-size:11px; flex:1; min-width:140px; }
    .log-reason-ok      { color:var(--win); font-weight:700; }
    .log-reason-rej     { color:var(--loss); }
    .log-reason-idle    { color:var(--muted); }
    .log-signal-row     { background:var(--win-dim) !important; border-left:2px solid var(--win); }
    .log-rej-row        { border-left:2px solid rgba(239,68,68,.4); }
    /* Filter pass/fail chips */
    .chip-filter-pass   { background:rgba(16,163,127,.13); color:var(--win); border:1px solid rgba(16,163,127,.25); font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; }
    .chip-filter-fail   { background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.22); font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; }
    /* Score pass/fail */
    .chip-score-pass    { background:rgba(16,163,127,.13); color:var(--win); font-size:10px; padding:1px 7px; border-radius:3px; font-weight:700; }
    .chip-score-fail    { background:rgba(239,68,68,.12); color:#f87171; font-size:10px; padding:1px 7px; border-radius:3px; font-weight:700; }
    /* ATR / ADX number chips */
    .chip-atr-val       { background:rgba(245,158,11,.13); color:var(--warn); font-size:10px; padding:1px 7px; border-radius:3px; font-weight:600; }
    .chip-adx-val       { background:rgba(99,102,241,.14); color:#a5b4fc; font-size:10px; padding:1px 7px; border-radius:3px; font-weight:600; }
    /* Bias chips */
    .chip-bull          { background:rgba(16,163,127,.13); color:var(--win); font-size:10px; padding:1px 7px; border-radius:3px; font-weight:600; }
    .chip-bear          { background:rgba(239,68,68,.12); color:#f87171; font-size:10px; padding:1px 7px; border-radius:3px; font-weight:600; }

    /* ── Plain-text structured log rows ─────────────── */
    .log-txt-row        { display:flex; align-items:center; flex-wrap:wrap; gap:5px; padding:7px 12px; border-radius:6px; font-size:12px; transition:background .1s; }
    .log-txt-row:hover  { background:rgba(255,255,255,.03); }
    .log-txt-row.row-rejected { border-left:2px solid var(--loss); }
    .log-txt-row.row-signal   { background:var(--win-dim) !important; border-left:2px solid var(--win); }
    .chip-status-ok     { background:var(--win-dim); color:var(--win); font-size:10px; padding:1px 7px; border-radius:3px; font-weight:700; }
    .chip-status-rej    { background:var(--loss-dim); color:var(--loss); font-size:10px; padding:1px 7px; border-radius:3px; font-weight:700; }
    .chip-status-idle   { background:rgba(255,255,255,.07); color:var(--muted); font-size:10px; padding:1px 7px; border-radius:3px; font-weight:600; }
    /* Reason/filter chips – colour-coded by category */
    .chip-reason        { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; border:1px solid transparent; }
    .chip-price         { background:rgba(239,68,68,.12); color:#f87171; border-color:rgba(239,68,68,.2); }
    .chip-rsi           { background:rgba(99,102,241,.15); color:#a5b4fc; border-color:rgba(99,102,241,.25); }
    .chip-atr           { background:rgba(245,158,11,.13); color:var(--warn); border-color:rgba(245,158,11,.25); }
    .chip-volume        { background:rgba(16,163,127,.12); color:var(--win); border-color:rgba(16,163,127,.2); }
    .chip-regime-tag    { background:rgba(245,158,11,.12); color:var(--warn); border-color:rgba(245,158,11,.2); }
    .chip-session-tag   { background:rgba(255,255,255,.07); color:var(--muted); border-color:rgba(255,255,255,.1); }
    .chip-generic       { background:rgba(255,255,255,.06); color:var(--muted); border-color:rgba(255,255,255,.1); }

    /* ═══════════════════════════════════════════════
       TERMINAL PANEL
    ═══════════════════════════════════════════════ */
    .term-panel         { border-radius:var(--radius); overflow:hidden; border:1px solid #1a1a1a; box-shadow:0 10px 40px rgba(0,0,0,.6); display:flex; flex-direction:column; }

    /* title bar */
    .term-titlebar      { display:flex; align-items:center; gap:10px; padding:8px 14px; background:#1c1c1e; border-bottom:1px solid #2a2a2a; min-height:36px; user-select:none; }
    .term-dots          { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .term-dot           { width:12px; height:12px; border-radius:50%; }
    .term-dot-red       { background:#ff5f57; }
    .term-dot-yellow    { background:#ffbd2e; }
    .term-dot-green2    { background:#28ca41; }
    .term-title-txt     { flex:1; font-family:'Courier New',monospace; font-size:11px; color:#5a5a6e; text-align:center; letter-spacing:.06em; }
    .term-meta          { display:flex; align-items:center; gap:7px; font-size:11px; flex-shrink:0; }
    .term-live-dot      { width:7px; height:7px; border-radius:50%; background:#28ca41; flex-shrink:0; }
    .term-live-dot.live { animation:pulse 1.4s infinite; }
    .term-live-dot.dead { background:#ef4444; animation:none; }
    .term-live-lbl      { font-family:monospace; font-size:10px; letter-spacing:.08em; font-weight:700; }
    .term-live-lbl.live { color:#28ca41; }
    .term-live-lbl.dead { color:#ef4444; }
    .term-cd            { font-family:monospace; font-size:10px; color:#3d4f3d; min-width:28px; }
    .term-rbtn          { background:none; border:none; color:#4b5563; cursor:pointer; font-size:15px; line-height:1; padding:0 2px; transition:color .15s; }
    .term-rbtn:hover    { color:#28ca41; }
    .term-newbadge      { background:#28ca41; color:#000; font-size:9px; font-weight:800; padding:1px 5px; border-radius:20px; letter-spacing:.04em; }

    /* body */
    .term-body          { background:#0d1117; flex:1; overflow-y:auto; max-height:440px; padding:6px 0 4px; font-family:'Cascadia Code','JetBrains Mono','Fira Code','Consolas','Courier New',monospace; font-size:12px; scroll-behavior:smooth; }
    .term-body::-webkit-scrollbar{ width:4px; }
    .term-body::-webkit-scrollbar-thumb{ background:#1e2a1e; border-radius:2px; }
    .term-body::-webkit-scrollbar-track{ background:transparent; }

    /* rows */
    .term-row           { display:flex; align-items:center; flex-wrap:wrap; gap:5px; padding:3px 12px; line-height:1.7; border-left:2px solid transparent; transition:background .1s; }
    .term-row:hover     { background:rgba(255,255,255,.025); }
    .term-row-new       { animation:termFlash .8s ease-out forwards; }
    .term-row-signal    { border-left-color:#28ca41 !important; background:rgba(40,202,65,.04); }
    .term-row-rej       { border-left-color:rgba(239,68,68,.5); }
    @keyframes termFlash{ 0%{ background:rgba(16,163,127,.22); } 100%{ background:transparent; } }

    /* row elements */
    .term-prompt        { color:#28ca41; font-weight:700; font-size:12px; flex-shrink:0; margin-right:2px; }
    .term-ts            { color:#3a6b3a; font-size:11px; min-width:90px; flex-shrink:0; }
    .term-plain         { color:#8e8ea0; font-size:11px; word-break:break-all; }
    .term-cursor-row    { display:flex; align-items:center; gap:4px; padding:5px 12px 8px; }
    .term-cursor        { display:inline-block; width:7px; height:13px; background:#28ca41; animation:blink .8s step-end infinite; vertical-align:middle; }
    @keyframes blink    { 0%,100%{ opacity:.9; } 50%{ opacity:0; } }
    .term-empty         { padding:28px 16px; color:#2a4a2a; font-family:monospace; font-size:12px; }
    .term-empty code    { color:#28ca41; }

    /* override chip sizes inside terminal rows */
    .term-row .log-jdir            { font-size:10px; padding:1px 6px; border-radius:3px; }
    .term-row .log-jts             { font-size:11px; min-width:0; color:#3a6b3a; }
    .term-row .log-chip            { font-size:10px; padding:1px 6px; border-radius:3px; }
    .term-row .chip-reason         { font-size:10px; padding:1px 6px; border-radius:3px; }
    .term-row .chip-status-ok,.term-row .chip-status-rej,.term-row .chip-status-idle { font-size:10px; padding:1px 6px; }
    .term-row .chip-filter-pass    { background:rgba(40,202,65,.18); color:#4ade80; border:none; }
    .term-row .chip-filter-fail    { background:rgba(239,68,68,.14); color:#f87171; border:none; }
    .term-row .chip-atr-val        { background:rgba(245,158,11,.14); color:#fbbf24; border:none; }
    .term-row .chip-adx-val        { background:rgba(139,92,246,.15); color:#a78bfa; border:none; }
    .term-row .chip-bull           { background:rgba(40,202,65,.14); color:#4ade80; border:none; }
    .term-row .chip-bear           { background:rgba(239,68,68,.12); color:#f87171; border:none; }

    /* ── Nav Tabs ────────────────────────────────── */
    .nav-tab            { padding:6px 14px; font-size:13px; font-weight:500; color:var(--muted); border:none; background:none; cursor:pointer; border-radius:6px; transition:color .15s, background .15s; white-space:nowrap; font-family:var(--font); }
    .nav-tab:hover      { color:var(--text); background:rgba(255,255,255,.06); }
    .nav-tab.active     { color:var(--accent); background:rgba(16,163,127,.12); font-weight:600; }
    .nav-tab-icon       { margin-right:5px; }

    /* ── Bot Control Card ────────────────────────── */
    .bot-ctrl           { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; padding:16px 20px; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); margin-bottom:2px; }
    .bot-ctrl-left      { display:flex; align-items:center; gap:14px; }
    .bot-status-dot     { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .bot-status-dot.on  { background:var(--win); box-shadow:0 0 8px rgba(16,163,127,.7); animation:pulse 2s infinite; }
    .bot-status-dot.off { background:var(--muted); }
    .bot-status-dot.starting { background:var(--warn); box-shadow:0 0 8px rgba(245,158,11,.7); animation:pulse 1s infinite; }
    .bot-info           { display:flex; flex-direction:column; gap:2px; }
    .bot-info-title     { font-weight:600; font-size:13px; }
    .bot-info-meta      { font-size:11px; color:var(--muted); font-family:monospace; }
    .btn-start          { padding:9px 22px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:opacity .15s; display:flex; align-items:center; gap:7px; }
    .btn-start:hover    { opacity:.88; }
    .btn-start:disabled { opacity:.45; cursor:not-allowed; }
    .btn-stop           { padding:9px 22px; background:var(--loss-dim); color:var(--loss); border:1px solid rgba(239,68,68,.3); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:opacity .15s; display:flex; align-items:center; gap:7px; }
    .btn-stop:hover     { opacity:.82; }
    .btn-stop:disabled  { opacity:.45; cursor:not-allowed; }
    .bot-stat-chips     { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .bot-chip           { font-size:11px; padding:2px 9px; border-radius:4px; font-weight:600; }
    .bot-chip-pid       { background:rgba(255,255,255,.06); color:var(--muted); }
    .bot-chip-uptime    { background:rgba(16,163,127,.1); color:var(--win); }
    .bot-chip-idle      { background:rgba(245,158,11,.1); color:var(--warn); }
    .bot-chip-err       { background:var(--loss-dim); color:var(--loss); }

    /* ── Live Signals ─────────────────────────────── */
    .sig-toolbar        { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .sig-toolbar-title  { font-size:13px; font-weight:700; flex:1; min-width:120px; }
    .sig-filter-btn     { font-size:11px; padding:4px 11px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; }
    .sig-filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .sig-table          { width:100%; border-collapse:collapse; font-size:12px; }
    .sig-table th       { padding:8px 12px; text-align:left; color:var(--muted); font-weight:600; font-size:11px; border-bottom:1px solid var(--border); white-space:nowrap; }
    .sig-table td       { padding:9px 12px; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:middle; }
    .sig-table tr:last-child td { border-bottom:none; }
    .sig-table tr:hover td      { background:rgba(255,255,255,.02); }
    .sig-dir-buy        { color:var(--win); font-weight:700; }
    .sig-dir-sell       { color:var(--loss); font-weight:700; }
    .sig-outcome-win    { background:rgba(16,163,127,.15); color:var(--win); font-weight:700; padding:2px 8px; border-radius:4px; font-size:11px; }
    .sig-outcome-loss   { background:var(--loss-dim); color:var(--loss); font-weight:700; padding:2px 8px; border-radius:4px; font-size:11px; }
    .sig-outcome-be     { background:rgba(245,158,11,.1); color:var(--warn); font-weight:700; padding:2px 8px; border-radius:4px; font-size:11px; }
    .sig-outcome-none   { color:var(--muted); font-size:11px; }
    .sig-mark-btn       { font-size:10px; padding:2px 7px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; margin-left:4px; }
    .sig-mark-btn:hover { background:rgba(255,255,255,.06); color:var(--text); }
    .sig-tg-sent        { color:var(--win); font-size:12px; }
    .sig-tg-fail        { color:var(--muted); font-size:12px; }
    .sig-empty          { padding:32px; text-align:center; color:var(--muted); font-size:13px; }

    /* ── Candlestick Chart ────────────────────────── */
    .chart-toolbar      { display:flex; align-items:center; gap:14px; padding:11px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; min-height:44px; }
    .chart-tf-btn       { font-size:11px; font-weight:700; padding:4px 13px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; letter-spacing:.5px; transition:all .15s; }
    .chart-tf-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .chart-tf-btn:hover:not(.active) { color:var(--text); border-color:var(--text); }
    .chart-ohlc         { display:flex; gap:14px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
    .chart-ohlc-item    { display:flex; gap:4px; }
    .chart-ohlc-lbl     { font-weight:600; }
    .chart-ohlc-val     { color:var(--text); font-family:monospace; }
    .chart-live-wrap    { display:flex; align-items:center; gap:6px; margin-left:auto; }
    .chart-live-dot     { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .chart-live-dot.connected    { background:#26a69a; animation:chartPulse 1.6s ease-in-out infinite; }
    .chart-live-dot.reconnecting { background:var(--warn); animation:chartPulse .6s ease-in-out infinite; }
    .chart-live-dot.disconnected { background:#555; }
    @keyframes chartPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.8)} }
    .chart-live-lbl     { font-size:10px; font-weight:700; letter-spacing:.8px; color:var(--muted); }
    .chart-wrap         { position:relative; background:#131722; }
    .chart-container    { width:100%; display:block; }
    .chart-overlay      { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:rgba(19,23,34,.85); z-index:20; pointer-events:none; }
    .chart-overlay-msg  { font-size:13px; color:var(--muted); }
    .chart-err-msg      { padding:24px; text-align:center; color:var(--loss); font-size:13px; background:#131722; }

  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/* ─────────────────────────────────────────────────────────────────────────────
   Utilities
───────────────────────────────────────────────────────────────────────────── */
const { useState, useEffect, useCallback, useRef } = React;

function fmt(n, dec = 2) {
  if (n === null || n === undefined || n === '' || isNaN(+n)) return '—';
  return (+n).toFixed(dec);
}
function fmtPct(n) { return fmt(n, 1) + '%'; }

function isoShort(ts) {
  if (!ts) return '—';
  return String(ts).replace('T', ' ').slice(0, 16);
}

function defaultRange() {
  const end = new Date();
  const start = new Date();
  start.setMonth(start.getMonth() - 6);
  return {
    start: start.toISOString().slice(0, 10),
    end:   end.toISOString().slice(0, 10),
  };
}

/* ─────────────────────────────────────────────────────────────────────────────
   SVG 3-D Equity Curve
───────────────────────────────────────────────────────────────────────────── */
function EquityChart({ data, startBalance = 5000 }) {
  if (!data || data.length < 2) {
    return <div className="chart-empty">Run a backtest to see the equity curve</div>;
  }

  const W = 800, H = 210, PX = 58, PY = 24;
  const DX = 22, DY = 13; // 3-D depth offset (right, up)

  const vals  = data.map(d => d.equity);
  const minV  = Math.min(...vals);
  const maxV  = Math.max(...vals);
  const span  = maxV - minV || 1;
  const lastV = vals[vals.length - 1];
  const lineColor = lastV >= startBalance ? '#10a37f' : '#ef4444';
  const darkColor = lastV >= startBalance ? '#0a6b52' : '#7f1d1d';

  const innerW = W - PX * 2 - DX;
  const innerH = H - PY * 2 - DY;
  const px = i => PX + (i / (data.length - 1)) * innerW;
  const py = v => H - PY - ((v - minV) / span) * innerH;

  const pts  = data.map((d, i) => [px(i), py(d.equity)]);
  const bpts = pts.map(([x, y]) => [x + DX, y - DY]);

  const frontBottom = H - PY;
  const backBottom  = frontBottom - DY;
  const rP = pts[pts.length - 1];
  const rB = bpts[bpts.length - 1];

  const floorD =
    `M${pts[0][0]},${frontBottom} L${bpts[0][0]},${backBottom}` +
    ` L${rB[0]},${backBottom} L${rP[0]},${frontBottom} Z`;

  const leftWallD =
    `M${pts[0][0]},${pts[0][1]} L${bpts[0][0]},${bpts[0][1]}` +
    ` L${bpts[0][0]},${backBottom} L${pts[0][0]},${frontBottom} Z`;

  const rightWallD =
    `M${rP[0]},${rP[1]} L${rB[0]},${rB[1]}` +
    ` L${rB[0]},${backBottom} L${rP[0]},${frontBottom} Z`;

  const areaD =
    `M${pts[0][0]},${pts[0][1]}` +
    pts.slice(1).map(([x, y]) => `L${x},${y}`).join('') +
    ` L${rP[0]},${frontBottom} L${pts[0][0]},${frontBottom} Z`;

  const polyPts  = pts.map(([x, y])  => `${x},${y}`).join(' ');
  const bPolyPts = bpts.map(([x, y]) => `${x},${y}`).join(' ');

  /* Rib lines every ~12 trades */
  const ribStep = Math.max(1, Math.floor(data.length / 12));
  const ribIdx  = [];
  for (let i = 0; i < pts.length; i += ribStep) ribIdx.push(i);
  if (ribIdx[ribIdx.length - 1] !== pts.length - 1) ribIdx.push(pts.length - 1);

  /* Y grid labels */
  const steps   = 3;
  const yLabels = Array.from({ length: steps + 1 }, (_, i) => {
    const v = minV + (span / steps) * i;
    return { y: py(v), label: `$${Math.round(v).toLocaleString()}` };
  }).reverse();

  /* Starting-balance baseline */
  const baseLine = startBalance >= minV && startBalance <= maxV;

  return (
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: '210px', display: 'block' }}>
        <defs>
          <linearGradient id="gFill3d" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor={lineColor} stopOpacity=".28" />
            <stop offset="100%" stopColor={lineColor} stopOpacity=".02" />
          </linearGradient>
          <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="3.5" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {/* Grid lines */}
        {yLabels.map((l, i) => (
          <line key={i} x1={PX} y1={l.y} x2={W - PX} y2={l.y}
            stroke="#2c2c2c" strokeWidth="1" strokeDasharray="3,5" />
        ))}
        {yLabels.map((l, i) => (
          <text key={`lbl${i}`} x={PX - 5} y={l.y + 4} fill="#555" fontSize="9" textAnchor="end">{l.label}</text>
        ))}

        {/* Starting-balance dashed baseline */}
        {baseLine && (
          <line x1={PX} y1={py(startBalance)} x2={W - PX - DX} y2={py(startBalance)}
            stroke="#555" strokeWidth="1" strokeDasharray="5,4" />
        )}

        {/* Back polyline (depth layer) */}
        <polyline points={bPolyPts} fill="none" stroke={darkColor} strokeWidth="1.2" strokeOpacity=".5" />

        {/* Floor */}
        <path d={floorD} fill={lineColor} fillOpacity=".07" stroke={darkColor} strokeWidth=".6" strokeOpacity=".4" />

        {/* Left wall */}
        <path d={leftWallD} fill={lineColor} fillOpacity=".10" stroke={darkColor} strokeWidth=".6" strokeOpacity=".4" />

        {/* Right wall */}
        <path d={rightWallD} fill={lineColor} fillOpacity=".10" stroke={darkColor} strokeWidth=".6" strokeOpacity=".4" />

        {/* Vertical ribs */}
        {ribIdx.map(idx => (
          <line key={idx}
            x1={pts[idx][0]} y1={pts[idx][1]}
            x2={bpts[idx][0]} y2={bpts[idx][1]}
            stroke={lineColor} strokeWidth=".8" strokeOpacity=".2" />
        ))}

        {/* Front area fill */}
        <path d={areaD} fill="url(#gFill3d)" />

        {/* Front polyline */}
        <polyline points={polyPts} fill="none" stroke={lineColor}
          strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />

        {/* Last-point dot with glow */}
        <circle cx={rP[0]} cy={rP[1]} r="5" fill={lineColor} filter="url(#dotGlow)" />

        {/* X-axis labels */}
        <text x={PX} y={H - 4} fill="#555" fontSize="9" textAnchor="start">Trade 1</text>
        <text x={W - PX - DX} y={H - 4} fill="#555" fontSize="9" textAnchor="end">Trade {data.length}</text>

        {/* Final balance label */}
        <text
          x={Math.min(rP[0] + 9, W - PX - DX - 72)}
          y={rP[1] - 9}
          fill={lineColor} fontSize="11" fontWeight="700">
          ${Math.round(lastV).toLocaleString()}
        </text>
      </svg>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   Metric Card
───────────────────────────────────────────────────────────────────────────── */
function MetricCard({ label, value, sub, color }) {
  return (
    <div className="mc">
      <div className="mc-label">{label}</div>
      <div className={`mc-value${color ? ' ' + color : ''}`}>{value}</div>
      {sub && <div className="mc-sub">{sub}</div>}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   Backtest Panel
───────────────────────────────────────────────────────────────────────────── */
function BacktestPanel({ onBacktestComplete, initialResult }) {
  const range = defaultRange();
  const [startDate, setStartDate] = useState(range.start);
  const [endDate,   setEndDate]   = useState(range.end);
  const [slC,       setSlC]       = useState(5);
  const [tpC,       setTpC]       = useState(10);
  const [balance,   setBalance]   = useState(5000);
  const [riskPct,   setRiskPct]   = useState(5);
  const [loading,   setLoading]   = useState(false);
  const [result,    setResult]    = useState(initialResult || null);
  const [error,     setError]     = useState('');

  const run = useCallback(async () => {
    setLoading(true);
    setError('');
    setResult(null);
    try {
      const res  = await fetch('/backtest', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          start_date:          startDate,
          end_date:            endDate,
          sl_candles:          slC,
          tp_candles:          tpC,
          starting_balance:    +balance || 5000,
          risk_per_trade_pct:  +riskPct || 5,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        // Strip noisy OANDA URLs from error messages shown to the user
        let msg = data.detail || 'Backtest request failed';
        msg = msg.replace(/https?:\/\/[^\s]+/g, '').replace(/400 Client Error: Bad Request for url:\s*/i, '').trim();
        if (/unable to fetch.*candles/i.test(msg)) {
          msg = 'Some OANDA candle windows were unavailable (weekend / partial day). Try a different date range.';
        }
        throw new Error(msg);
      }
      if (data.error) throw new Error(data.error);
      setResult(data);
      if (onBacktestComplete) onBacktestComplete(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [startDate, endDate, slC, tpC, balance, riskPct]);

  const m = result?.metrics || {};
  const netPnl = result?.equity_curve?.slice(-1)[0]?.equity ?? null;

  return (
    <div className="card">
      <div className="card-hd">
        <span className="card-title">Backtest · XAUUSD 5m / 15m</span>
        <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
          {result && <span className="badge badge-green">✓ Complete</span>}
          {result && <button className="btn" style={{padding:'2px 10px',fontSize:'11px',color:'var(--muted)'}}
            onClick={() => { setResult(null); if(onBacktestComplete) onBacktestComplete(null); try{localStorage.removeItem('sean0_last_backtest')}catch{} }}>
            ✕ Clear
          </button>}
        </div>
      </div>
      <div className="card-body">

        {/* ── Controls ── */}
        <div className="form-grid">
          <div className="fg">
            <label className="fg-label">Start Date</label>
            <input type="date" className="input" value={startDate}
              onChange={e => setStartDate(e.target.value)} />
          </div>
          <div className="fg">
            <label className="fg-label">End Date</label>
            <input type="date" className="input" value={endDate}
              onChange={e => setEndDate(e.target.value)} />
          </div>
          <div className="fg">
            <label className="fg-label">
              Stop-Loss Candles
              <span className="fg-accent">({slC} candles = {(slC * 0.3).toFixed(1)}× ATR)</span>
            </label>
            <div className="slider-row">
              <input type="range" min="5" max="20" value={slC}
                style={{ flex: 1 }}
                onChange={e => setSlC(+e.target.value)} />
              <span className="slider-val">{slC}</span>
            </div>
          </div>
          <div className="fg">
            <label className="fg-label">
              Take-Profit Candles
              <span className="fg-accent">({tpC} candles = {(tpC * 0.3).toFixed(1)}× ATR)</span>
            </label>
            <div className="slider-row">
              <input type="range" min="5" max="20" value={tpC}
                style={{ flex: 1 }}
                onChange={e => setTpC(+e.target.value)} />
              <span className="slider-val">{tpC}</span>
            </div>
          </div>
          <div className="fg">
            <label className="fg-label">Starting Balance <span className="fg-accent">(USD)</span></label>
            <input type="number" className="input" value={balance} min="100" step="100"
              onChange={e => setBalance(+e.target.value)} />
          </div>
          <div className="fg">
            <label className="fg-label">
              Risk per Trade
              <span className="fg-accent">
                ({riskPct}% = ${((+balance || 5000) * riskPct / 100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})} / trade)
              </span>
            </label>
            <div className="slider-row">
              <input type="range" min="1" max="10" step="1" value={riskPct}
                style={{ flex: 1 }}
                onChange={e => setRiskPct(+e.target.value)} />
              <span className="slider-val">{riskPct}%</span>
            </div>
          </div>
        </div>

        <button className="btn btn-primary" onClick={run} disabled={loading}>
          {loading ? <><span className="spin" /> Running backtest…</> : '▶  Run Backtest'}
        </button>

        {error && <div className="err-box">⚠ {error}</div>}

        {/* ── Results ── */}
        {result && (
          <>
            <hr className="divider" />

            {/* ── Trade Summary Banner ── */}
            <div className="trade-summary">
              <div className="ts-block ts-block-total">
                <span className="ts-label">Total Trades</span>
                <span className="ts-num ts-num-total">{m.total_trades ?? '—'}</span>
                <span className="ts-sub">closed positions</span>
              </div>
              <div className="ts-block ts-block-win">
                <span className="ts-label">✔ Wins</span>
                <span className="ts-num ts-num-win">{m.wins ?? 0}</span>
                <span className="ts-sub">profitable trades</span>
              </div>
              <div className="ts-block ts-block-loss">
                <span className="ts-label">✘ Losses</span>
                <span className="ts-num ts-num-loss">{m.losses ?? 0}</span>
                <span className="ts-sub">losing trades</span>
              </div>
              <div className="ts-block ts-block-rate">
                <span className="ts-label">Win Rate</span>
                <span className="ts-num ts-num-rate">{fmtPct(m.win_rate)}</span>
                <span className="ts-sub">{m.win_rate >= 50 ? '▲ above 50%' : '▼ below 50%'}</span>
              </div>
            </div>

            <div className="metrics-grid" style={{ marginBottom: 14 }}>
              <MetricCard
                label="Total Trades"
                value={m.total_trades ?? '—'}
                sub={`${m.wins ?? 0}W  /  ${m.losses ?? 0}L`}
              />
              <MetricCard
                label="Win Rate"
                value={fmtPct(m.win_rate)}
                color={m.win_rate >= 50 ? 'g' : 'r'}
                sub="of all closed trades"
              />
              <MetricCard
                label="Profit Factor"
                value={
                  m.profit_factor == null ? '—'
                  : m.profit_factor > 999  ? '∞'
                  : fmt(m.profit_factor)
                }
                color={m.profit_factor >= 1.5 ? 'g' : 'r'}
              />
              <MetricCard
                label="Avg R"
                value={fmt(m.average_r, 3) + 'R'}
                color={m.average_r > 0 ? 'g' : 'r'}
                sub="per trade"
              />
              <MetricCard
                label="Max Drawdown"
                value={`${fmt(m.max_drawdown_r, 2)}R`}
                color="r"
              />
              <MetricCard
                label="Ending Balance"
                value={m.ending_balance != null ? `$${(+m.ending_balance).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}` : '—'}
                color={m.ending_balance != null && m.ending_balance >= balance ? 'g' : 'r'}
                sub={`started at $${(+balance).toLocaleString()}`}
              />
            </div>

            <EquityChart data={result.equity_curve} startBalance={+balance || 5000} />
          </>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   Live Logs Panel
───────────────────────────────────────────────────────────────────────────── */
function lvlNorm(l) {
  const u = (l || 'INFO').toUpperCase();
  return u === 'WARNING' ? 'WARN' : u;
}

function tryParseJson(msg) {
  if (!msg) return null;
  const start = msg.indexOf('{');
  if (start === -1) return null;
  try { return JSON.parse(msg.slice(start)); } catch (_) { return null; }
}

/* ── Parse plain-text structured log lines ────────────────────────────────
   Handles formats like:
     "SELL LONDON rejected: price_break, rsi_filter, atr_expansion"
     "BUY NY signal: score=7, rsi=44.2, atr=3.12, price_break"
     "HOLD TOKYO idle: regime_filter, volume_filter"
   Returns null if the message doesn't match.
────────────────────────────────────────────────────────────────────────── */
function tryParseStructured(msg) {
  if (!msg) return null;
  const RE = /^(BUY|SELL|LONG|SHORT|HOLD|FLAT)?\s*(LONDON|NEW[_\s]?YORK|NY|TOKYO|SYDNEY|ASIA|EUROPE|OVERLAP|KILLZONE|US|OPEN)?\s*(rejected|signal|allowed|passed|entry|opened|sent|idle|wait|skipped|blocked|no[\s_]trade|filter)[\s:,]+(.*)/i;
  const m = RE.exec(msg.trim());
  if (!m) return null;
  const direction = (m[1] || '').toUpperCase();
  const session   = (m[2] || '').toUpperCase().replace(/_/g,' ');
  const status    = m[3].toLowerCase();
  const rest      = m[4] || '';
  /* Split rest into key=value pairs and bare tags */
  const params = [];
  rest.split(/[\s,]+/).forEach(tok => {
    tok = tok.trim();
    if (!tok) return;
    params.push(tok);
  });
  return { direction, session, status, params };
}

/* Map a param token to a CSS chip class */
function reasonChipClass(tok) {
  const t = tok.toLowerCase();
  if (/price|break|close|candle|body|wick/.test(t)) return 'chip-reason chip-price';
  if (/rsi|momentum|oversold|overbought/.test(t))    return 'chip-reason chip-rsi';
  if (/atr|expansion|volatil|range/.test(t))         return 'chip-reason chip-atr';
  if (/volume|vol/.test(t))                          return 'chip-reason chip-volume';
  if (/regime|trend|direction/.test(t))              return 'chip-reason chip-regime-tag';
  if (/session|london|ny|tokyo|sydney|asia|euro|kill/.test(t)) return 'chip-reason chip-session-tag';
  if (/score|threshold/.test(t))                     return 'chip-reason chip-score';
  return 'chip-reason chip-generic';
}

/* Parse key=value tokens like rsi=44.2 → label "RSI" value "44.2" */
function parseKV(tok) {
  const kv = tok.match(/^([a-z_]+)=(.+)$/i);
  if (!kv) return null;
  return { key: kv[1].toUpperCase(), val: kv[2] };
}

/* ── Filter label map ─── */
const FILTER_LABELS = {
  trend_alignment: 'Trend', price_trigger: 'Price Break',
  rsi_filter: 'RSI', atr_expansion: 'ATR Expansion',
  session_filter: 'Session', volume_filter: 'Volume',
  regime_filter: 'Regime', score_threshold: 'Score',
};

function renderLogEntry(log, i, isNew = false) {
  const msg = log.message || log.raw || '';

  /* ── 1. Try JSON structured row (actual decision_trace.log format) ── */
  const parsed = tryParseJson(msg);
  if (parsed && (parsed.direction || parsed.session || parsed.decision)) {
    const dir        = (parsed.direction || '').toUpperCase();
    const dirCls     = dir === 'BUY' ? 'log-jdir-buy' : dir === 'SELL' ? 'log-jdir-sell' : 'log-jdir-none';
    const ts         = (parsed.timestamp || log.timestamp || '').slice(0, 16).replace('T', ' ');
    const decision   = (parsed.decision || '').toLowerCase();
    const isSignal   = decision === 'signal' || parsed.signal_generated === true;
    const isRejected = decision === 'rejected';

    const regime  = parsed.market_regime || parsed.regime || '';
    const regConf = parsed.regime_confidence != null ? (parsed.regime_confidence * 100).toFixed(1) : null;
    const score   = parsed.signal_score ?? parsed.score;
    const threshold = parsed.score_threshold ?? parsed.threshold;

    const breakdown  = parsed.breakdown || {};
    const filterChips = Object.entries(breakdown).map(([key, pts]) => {
      const label  = FILTER_LABELS[key] || key.replace(/_/g, ' ');
      const passed = pts > 0;
      return <span key={key} className={`chip-reason ${passed ? 'chip-filter-pass' : 'chip-filter-fail'}`}>{passed ? '✓' : '✗'} {label}{pts > 0 ? ` +${pts}` : ''}</span>;
    });

    const rd   = parsed.regime_details || {};
    const atr  = rd.atr14  != null ? (+rd.atr14).toFixed(2) : null;
    const adx  = rd.adx14  != null ? (+rd.adx14).toFixed(1) : null;
    const bias = rd.trend_bias || '';
    const beh  = (parsed.strategy_behavior || rd.strategy_behavior || '').replace(/_/g, ' ');

    const rowCls = ['term-row',
      isNew     ? 'term-row-new'    : '',
      isSignal  ? 'term-row-signal' : '',
      isRejected? 'term-row-rej'    : '',
    ].filter(Boolean).join(' ');

    return (
      <div key={i} className={rowCls}>
        <span className="term-prompt">&gt;</span>
        <span className="term-ts">{ts}</span>
        {dir      && <span className={`log-jdir ${dirCls}`}>{dir}</span>}
        {parsed.session && <span className="log-chip chip-session">{parsed.session}</span>}
        {decision && <span className={isSignal ? 'chip-status-ok' : isRejected ? 'chip-status-rej' : 'chip-status-idle'}>{decision.toUpperCase()}</span>}
        {regime   && <span className="log-chip chip-regime">{regime.replace(/_/g,' ')}{regConf ? ` ${regConf}%` : ''}</span>}
        {beh      && <span className="log-chip chip-score">{beh}</span>}
        {score != null && <span className={`log-chip ${score >= (threshold ?? 80) ? 'chip-score-pass' : 'chip-score-fail'}`}>score {score}/{threshold ?? '?'}</span>}
        {filterChips}
        {atr  && <span className="log-chip chip-atr-val">ATR {atr}</span>}
        {adx  && <span className="log-chip chip-adx-val">ADX {adx}</span>}
        {bias && <span className={`log-chip ${bias === 'bull' ? 'chip-bull' : 'chip-bear'}`}>{bias} bias</span>}
      </div>
    );
  }

  /* ── 2. Try plain-text structured row ── */
  const struct = tryParseStructured(msg);
  if (struct) {
    const { direction, session, status, params } = struct;
    const isRej    = /reject|skip|block|deny|no.?trade|filter|idle|wait/.test(status);
    const isSignal = /signal|allowed|passed|entry|opened|sent/.test(status);
    const dirCls   = direction === 'BUY' ? 'log-jdir-buy' : direction === 'SELL' ? 'log-jdir-sell' : 'log-jdir-none';
    const rowCls   = ['term-row',
      isNew    ? 'term-row-new'    : '',
      isSignal ? 'term-row-signal' : '',
      isRej    ? 'term-row-rej'    : '',
    ].filter(Boolean).join(' ');
    return (
      <div key={i} className={rowCls}>
        <span className="term-prompt">&gt;</span>
        <span className="term-ts">{(log.timestamp || '').slice(0, 16)}</span>
        {direction && <span className={`log-jdir ${dirCls}`}>{direction}</span>}
        {session   && <span className="log-chip chip-session">{session}</span>}
        <span className={isSignal ? 'chip-status-ok' : isRej ? 'chip-status-rej' : 'chip-status-idle'}>{status.toUpperCase()}</span>
        {params.map((tok, j) => {
          const kv = parseKV(tok);
          if (kv) return <span key={j} className={reasonChipClass(kv.key)}>{kv.key} <strong>{kv.val}</strong></span>;
          return <span key={j} className={reasonChipClass(tok)}>{tok.replace(/_/g,' ')}</span>;
        })}
      </div>
    );
  }

  /* ── 3. Fallback: plain terminal line ── */
  const txt    = msg.toLowerCase();
  const isErr  = log.level === 'ERROR' || log.level === 'CRITICAL' || txt.includes('error') || txt.includes('failed');
  const isSig  = txt.includes('[signal]') || txt.includes('signal_sent');
  const rowCls = ['term-row', isNew ? 'term-row-new' : '', isSig ? 'term-row-signal' : ''].filter(Boolean).join(' ');
  return (
    <div key={i} className={rowCls}>
      <span className="term-prompt">&gt;</span>
      <span className="term-ts">{(log.timestamp || '').slice(0, 19)}</span>
      <span className={`term-plain ${isErr ? 'td-loss' : isSig ? 'td-win' : ''}`}>{msg}</span>
    </div>
  );
}

function LogsPanel() {
  const [logs,      setLogs]      = useState([]);
  const [ready,     setReady]     = useState(false);
  const [botOnline, setBotOnline] = useState(false);
  const [lastSeen,  setLastSeen]  = useState('');
  const [newIdxs,   setNewIdxs]   = useState(new Set());
  const [tick,      setTick]      = useState(0);   // drives live clock in titlebar
  const prevCountRef = useRef(0);
  const bottomRef    = useRef(null);

  /* ── Poll /logs every 3 s ── */
  useEffect(() => {
    let cancelled = false;

    function poll() {
      fetch('/logs?limit=60')
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (cancelled) return;
          var entries = (d.logs || []).slice().reverse(); // oldest→newest
          var prevLen = prevCountRef.current;
          if (entries.length > prevLen) {
            var fresh = new Set();
            for (var j = prevLen; j < entries.length; j++) {
              fresh.add(j);
            }
            setNewIdxs(fresh);
            setTimeout(function(){ setNewIdxs(new Set()); }, 1200);
          }
          prevCountRef.current = entries.length;
          setLogs(entries);
          setReady(true);
          if (d.file_mtime) {
            var dt  = new Date(d.file_mtime * 1000);
            var ago = Date.now() - dt.getTime();
            setLastSeen(dt.toLocaleTimeString());
            setBotOnline(ago < 5 * 60 * 1000);
          }
        })
        .catch(function(){ if (!cancelled) setReady(true); });
    }

    poll();
    var id = setInterval(poll, 3000);
    var tickId = setInterval(function(){ setTick(function(t){ return t + 1; }); }, 1000);

    return function(){ cancelled = true; clearInterval(id); clearInterval(tickId); };
  }, []);

  /* ── Auto-scroll to newest ── */
  useEffect(function(){
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [logs.length]);

  /* ── Safe render wrapper — never let one bad entry crash the list ── */
  function safeRender(log, i) {
    try {
      return renderLogEntry(log, i, newIdxs.has(i));
    } catch(e) {
      return (
        <div key={i} className="term-row">
          <span className="term-prompt">&gt;</span>
          <span className="term-plain">{String(log.raw || log.message || '').slice(0, 120)}</span>
        </div>
      );
    }
  }

  var now = new Date().toLocaleTimeString();

  return (
    <div className="term-panel">
      {/* macOS title bar */}
      <div className="term-titlebar">
        <div className="term-dots">
          <span className="term-dot term-dot-red" />
          <span className="term-dot term-dot-yellow" />
          <span className="term-dot term-dot-green2" />
        </div>
        <span className="term-title-txt">SEAN0-ALGO · decision_trace.log</span>
        <div className="term-meta">
          <span className={`term-live-dot ${ready ? 'live' : 'dead'}`} />
          <span className={`term-live-lbl ${ready ? 'live' : 'dead'}`} style={{fontSize:'9px'}}>
            {ready ? 'LIVE' : 'CONNECTING'}
          </span>
          <span style={{fontSize:'9px', fontFamily:'monospace', fontWeight:700,
            color: botOnline ? '#28ca41' : '#f59e0b'}}>
            {botOnline ? '● BOT ON' : '○ BOT IDLE'}
          </span>
          <span style={{fontSize:'9px', fontFamily:'monospace', color:'#3a5a3a'}}>{now}</span>
        </div>
      </div>

      {/* Terminal body */}
      <div className="term-body">
        {!ready ? (
          <div className="term-empty">
            <span className="term-prompt">$</span> connecting to log feed…
          </div>
        ) : (
          <div>
            {!botOnline && lastSeen && (
              <div style={{padding:'5px 14px', background:'rgba(245,158,11,.07)',
                borderBottom:'1px solid rgba(245,158,11,.15)', color:'#f59e0b',
                fontSize:'11px', fontFamily:'monospace', lineHeight:'1.6'}}>
                ⚠ Bot idle · last log: <strong>{lastSeen}</strong> · run <code style={{color:'#fbbf24'}}>python main.py</code>
              </div>
            )}
            {logs.length === 0 ? (
              <div className="term-empty">
                <span className="term-prompt">$</span> no entries · start bot: <code>python main.py</code>
              </div>
            ) : (
              logs.map(function(log, i){ return safeRender(log, i); })
            )}
          </div>
        )}
        <div className="term-cursor-row">
          <span className="term-prompt">$</span>
          <span className="term-cursor" />
        </div>
        <div ref={bottomRef} />
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   Bot Control Panel
───────────────────────────────────────────────────────────────────────────── */
function BotControlPanel() {
  const [status,  setStatus]  = useState(null);   // null | {running, pid, uptime_seconds, log_age_seconds}
  const [busy,    setBusy]    = useState(false);
  const [flash,   setFlash]   = useState('');      // success/error message

  // Poll /bot/status every 4 seconds
  useEffect(() => {
    let cancelled = false;
    function poll() {
      fetch('/bot/status')
        .then(r => r.json())
        .then(d => { if (!cancelled) setStatus(d); })
        .catch(() => {});
    }
    poll();
    const id = setInterval(poll, 4000);
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  async function handleStart() {
    setBusy(true); setFlash('');
    try {
      const res  = await fetch('/bot/start', { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to start');
      setFlash(data.status === 'already_running' ? 'Bot is already running.' : 'Bot started!');
      setStatus(s => ({ ...s, running: true, pid: data.pid }));
    } catch (e) {
      setFlash('\u26a0 ' + e.message);
    } finally {
      setBusy(false);
      setTimeout(() => setFlash(''), 4000);
    }
  }

  async function handleStop() {
    setBusy(true); setFlash('');
    try {
      const res  = await fetch('/bot/stop', { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to stop');
      setFlash('Bot stopped.');
      setStatus(s => ({ ...s, running: false, pid: null, uptime_seconds: null }));
    } catch (e) {
      setFlash('\u26a0 ' + e.message);
    } finally {
      setBusy(false);
      setTimeout(() => setFlash(''), 4000);
    }
  }

  function fmtUptime(secs) {
    if (!secs) return null;
    if (secs < 60)   return secs + 's';
    if (secs < 3600) return Math.floor(secs/60) + 'm ' + (secs%60) + 's';
    return Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm';
  }
  function fmtAge(secs) {
    if (secs == null) return null;
    if (secs < 60)   return secs + 's ago';
    if (secs < 3600) return Math.floor(secs/60) + 'm ago';
    return Math.floor(secs/3600) + 'h ago';
  }

  const running = status?.running ?? false;
  const dotCls  = busy ? 'starting' : running ? 'on' : 'off';
  const uptime  = fmtUptime(status?.uptime_seconds);
  const logAge  = fmtAge(status?.log_age_seconds);
  const logFresh = status?.log_age_seconds != null && status.log_age_seconds < 300;

  return (
    <div className="bot-ctrl card">
      <div className="bot-ctrl-left">
        <div className={`bot-status-dot ${dotCls}`} />
        <div className="bot-info">
          <span className="bot-info-title">
            {busy ? 'Updating…' : running ? 'Bot Running' : 'Bot Stopped'}
          </span>
          <div className="bot-stat-chips">
            {status?.pid  && <span className="bot-chip bot-chip-pid">PID {status.pid}</span>}
            {uptime       && <span className="bot-chip bot-chip-uptime">up {uptime}</span>}
            {logAge && logFresh  && <span className="bot-chip bot-chip-uptime">last log {logAge}</span>}
            {logAge && !logFresh && <span className="bot-chip bot-chip-idle">last log {logAge}</span>}
            {flash        && <span className={`bot-chip ${flash.includes('\u26a0') ? 'bot-chip-err' : 'bot-chip-uptime'}`}>{flash}</span>}
          </div>
        </div>
      </div>
      <div style={{display:'flex', gap:'10px'}}>
        <button className="btn-start" onClick={handleStart}
          disabled={busy || running}>
          &#9654; Start Bot
        </button>
        <button className="btn-stop" onClick={handleStop}
          disabled={busy || !running}>
          &#9632; Stop Bot
        </button>
      </div>
    </div>
  );
}
