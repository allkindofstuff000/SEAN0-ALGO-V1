                  <div key={r._id} style={{
                    display:'flex', alignItems:'center', gap:'12px',
                    padding:'10px 16px',
                    borderBottom:'1px solid var(--border)',
                    background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.015)',
                    transition:'background 0.15s',
                  }}
                    onMouseEnter={e => e.currentTarget.style.background='rgba(0,212,255,0.06)'}
                    onMouseLeave={e => e.currentTarget.style.background= i%2===0?'transparent':'rgba(255,255,255,0.015)'}
                  >
                    {/* Number badge */}
                    <div style={{
                      minWidth:'36px', height:'36px', borderRadius:'8px',
                      background:'rgba(0,212,255,0.12)', border:'1px solid rgba(0,212,255,0.25)',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontWeight:'800', fontSize:'13px', color:'var(--accent)', flexShrink:0
                    }}>#{num}</div>

                    {/* Info */}
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontWeight:'700', fontSize:'13px', color:'var(--text)', marginBottom:'3px'}}>
                        Backtest #{num}
                        <span style={{color:'var(--muted)', fontWeight:'400', fontSize:'11px', marginLeft:'8px'}}>{dt}</span>
                      </div>
                      <div style={{fontSize:'11px', color:'var(--muted)', display:'flex', gap:'12px', flexWrap:'wrap'}}>
                        <span>📅 {range}</span>
                        <span>🔢 {r.trade_count || 0} trades</span>
                        <span style={{color: parseFloat(wr) >= 50 ? 'var(--green)' : 'var(--muted)'}}>🎯 WR {wr}</span>
                        <span>📊 PF {pf}</span>
                        <span style={{color:'var(--accent)'}}>💰 {bal}</span>
                        <span>⚙ SL {p.sl_candles || '?'}c / TP {p.tp_candles || '?'}c / Risk {p.risk_per_trade_pct || '?'}%</span>
                      </div>
                    </div>

                    {/* Load button */}
                    <button
                      className="btn btn-primary"
                      style={{flexShrink:0, padding:'5px 14px', fontSize:'12px'}}
                      disabled={isLoading}
                      onClick={() => loadReport(r._id, i)}
                    >
                      {isLoading ? <span className="spin" /> : '▶ Load'}
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Chart Panel (multi-TF, tick-based SSE) ─────────────────────────────── */
const TF_LIST   = ['M1', 'M5', 'M15', 'H1'];
const TF_LABELS = { M1: '1M', M5: '5M', M15: '15M', H1: '1H' };

function ChartPanel() {
  // ── Refs (no re-renders on change) ────────────────────────────────────────
  const containerRef   = useRef(null);
  const chartRef       = useRef(null);
  const seriesRef      = useRef(null);
  const plRef          = useRef(null);
  const cacheRef       = useRef({ M1:[], M5:[], M15:[], H1:[] }); // historical
  const liveRef        = useRef({ M1:null, M5:null, M15:null, H1:null }); // current live
  const activeTfRef    = useRef('M5');  // for SSE closure
  const esRef          = useRef(null);

  // ── State ─────────────────────────────────────────────────────────────────
  const [activeTf,     _setActiveTf]   = useState('M5');
  const [ohlcByTf,     setOhlcByTf]   = useState({});
  const [streamStatus, setStreamStatus]= useState('disconnected');
  const [lastTick,     setLastTick]    = useState('');
  const [loading,      setLoading]     = useState(true);
  const [error,        setError]       = useState(null);

  // Keep ref and state in sync for TF
  function setActiveTf(tf) {
    activeTfRef.current = tf;
    _setActiveTf(tf);
  }

  const LC = typeof LightweightCharts !== 'undefined' ? LightweightCharts : null;

  // ── Create chart once on mount ────────────────────────────────────────────
  useEffect(() => {
    if (!containerRef.current || !LC) {
      setError('Chart library failed to load — please refresh.');
      setLoading(false);
      return;
    }
    const chart = LC.createChart(containerRef.current, {
      autoSize: true,
      layout: { background: { color: '#131722' }, textColor: '#b2b5be' },
      grid:   { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
      crosshair:       { mode: LC.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#2a2e39' },
      timeScale:       { borderColor: '#2a2e39', timeVisible: true, secondsVisible: false },
    });
    const series = chart.addCandlestickSeries({
      upColor: '#26a69a', downColor: '#ef5350',
      borderUpColor: '#26a69a', borderDownColor: '#ef5350',
      wickUpColor:   '#26a69a', wickDownColor:   '#ef5350',
    });
    chart.subscribeCrosshairMove(param => {
      if (param.seriesData && param.seriesData.has(series)) {
        const d = param.seriesData.get(series);
        if (d) setOhlcByTf(p => ({ ...p, [activeTfRef.current]: d }));
      }
    });
    chartRef.current  = chart;
    seriesRef.current = series;
    return () => { try { chart.remove(); } catch {} chartRef.current = null; seriesRef.current = null; };
  }, []); // Once

  // ── When active TF changes → reload chart from cache ─────────────────────
  useEffect(() => {
    if (!chartRef.current || !seriesRef.current) return;
    // Update watermark
    chartRef.current.applyOptions({ watermark: {
      visible: true, fontSize: 28, color: 'rgba(255,255,255,0.06)',
      horzAlign: 'center', vertAlign: 'center',
      text: `XAUUSD · ${TF_LABELS[activeTf]}`,
    }});
    // Reload cached history
    const hist = cacheRef.current[activeTf] || [];
    if (hist.length) {
      try {
        seriesRef.current.setData(hist);
        // overlay live candle if available
        const live = liveRef.current[activeTf];
        if (live) { try { seriesRef.current.update(live); } catch {} }
        const last = live || hist[hist.length - 1];
        _updatePriceLine(last.close);
        setOhlcByTf(p => ({ ...p, [activeTf]: last }));
      } catch {}
    }
  }, [activeTf]);

  function _updatePriceLine(price) {
    if (!seriesRef.current) return;
    try {
      if (plRef.current) seriesRef.current.removePriceLine(plRef.current);
      plRef.current = seriesRef.current.createPriceLine({
        price, color: '#10a37f', lineWidth: 1, lineStyle: 2, axisLabelVisible: true,
      });
    } catch {}
  }

  // ── SSE stream (connect once on mount, never reconnect on TF change) ──────
  useEffect(() => {
    let active = true;
    let reconnTimer = null;
    let es = null;

    function connect() {
      if (!active) return;
      try { if (es) es.close(); } catch {}
      es = new EventSource('/api/stream/all');
      esRef.current = es;
      setStreamStatus('connected');
      setError(null);

      es.onmessage = evt => {
        if (!active) return;
        try {
          const msg = JSON.parse(evt.data);
          handleMsg(msg);
        } catch {}
      };

      es.onerror = () => {
        if (!active) return;
        setStreamStatus('reconnecting');
        try { es.close(); } catch {}
        reconnTimer = setTimeout(connect, 2000);
      };
    }

    function handleMsg(msg) {
      const type = msg.type;

      if (type === 'init') {
        // Seed all 4 TF caches from historical data
        const candles = msg.candles || {};
        TF_LIST.forEach(tf => {
          if (candles[tf] && candles[tf].length) {
            cacheRef.current[tf] = candles[tf];
          }
        });
        // Render the currently active TF
        const hist = cacheRef.current[activeTfRef.current] || [];
        if (hist.length && seriesRef.current) {
          try {
            seriesRef.current.setData(hist);
            const last = hist[hist.length - 1];
            _updatePriceLine(last.close);
            setOhlcByTf(p => ({ ...p, [activeTfRef.current]: last }));
          } catch {}
        }
        setLoading(false);
      }

      else if (type === 'candle') {
        // Completed candle — append to cache + update chart if visible
        const tf     = msg.timeframe;
        const candle = msg.candle;
        if (!tf || !candle) return;
        const cache = cacheRef.current[tf];
        cache.push(candle);
        if (cache.length > 200) cache.splice(0, cache.length - 200);
        // Update live ref with new completed candle
        liveRef.current[tf] = candle;
        if (tf === activeTfRef.current && seriesRef.current) {
          try {
            seriesRef.current.update({ time: candle.time, open: candle.open, high: candle.high, low: candle.low, close: candle.close });
            _updatePriceLine(candle.close);
            setOhlcByTf(p => ({ ...p, [tf]: candle }));
          } catch {}
        }
      }

      else if (type === 'tick') {
        // Live in-progress candle update for all TFs
        const now = new Date();
        setLastTick(now.toTimeString().slice(0, 8));
        const all = msg.candles || {};
        TF_LIST.forEach(tf => {
          const c = all[tf];
          if (!c) return;
          liveRef.current[tf] = c;
          if (tf === activeTfRef.current && seriesRef.current) {
            try {
              seriesRef.current.update({ time: c.time, open: c.open, high: c.high, low: c.low, close: c.close });
              _updatePriceLine(c.close);
              setOhlcByTf(p => ({ ...p, [tf]: c }));
            } catch {}
          }
        });
      }

      else if (type === 'status') {
        setStreamStatus(msg.status || 'disconnected');
      }
      // heartbeat — ignore
    }

    setTimeout(connect, 400); // small delay to let chart mount
    return () => {
      active = false;
      if (reconnTimer) clearTimeout(reconnTimer);
      if (es) { try { es.close(); } catch {} }
      setStreamStatus('disconnected');
    };
  }, []); // Once — SSE stream lives for component lifetime

  // ── Render ────────────────────────────────────────────────────────────────
  function fmtP(v) { return v != null ? Number(v).toFixed(2) : '—'; }

  const currOhlc = ohlcByTf[activeTf];
  const statusLabel = streamStatus === 'connected' ? 'LIVE'
    : streamStatus === 'reconnecting' ? 'Reconnecting…' : 'Offline';

  return (
    <div className="card">
      {/* ── Toolbar ── */}
      <div className="chart-toolbar">
        {/* Symbol + TF buttons */}
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:13, fontWeight:700, letterSpacing:'.5px', color:'var(--text)' }}>XAUUSD</span>
          {TF_LIST.map(tf => (
            <button key={tf}
              className={`chart-tf-btn${activeTf === tf ? ' active' : ''}`}
              onClick={() => setActiveTf(tf)}>
              {TF_LABELS[tf]}
            </button>
          ))}
        </div>

        {/* OHLC bar */}
        {currOhlc && (
          <div className="chart-ohlc">
            <span className="chart-ohlc-item">
              <span className="chart-ohlc-lbl" style={{ color:'var(--muted)' }}>O</span>
              <span className="chart-ohlc-val">{fmtP(currOhlc.open)}</span>
            </span>
            <span className="chart-ohlc-item">
              <span className="chart-ohlc-lbl" style={{ color:'#26a69a' }}>H</span>
              <span className="chart-ohlc-val" style={{ color:'#26a69a' }}>{fmtP(currOhlc.high)}</span>
            </span>
            <span className="chart-ohlc-item">
              <span className="chart-ohlc-lbl" style={{ color:'#ef5350' }}>L</span>
              <span className="chart-ohlc-val" style={{ color:'#ef5350' }}>{fmtP(currOhlc.low)}</span>
            </span>
            <span className="chart-ohlc-item">
              <span className="chart-ohlc-lbl" style={{ color:'var(--muted)' }}>C</span>
              <span className="chart-ohlc-val">{fmtP(currOhlc.close)}</span>
            </span>
          </div>
        )}

        {/* Live status */}
        <div className="chart-live-wrap">
          <span className={`chart-live-dot ${streamStatus}`} />
          <span className="chart-live-lbl">{statusLabel}</span>
          {lastTick && (
            <span style={{ fontSize:10, color:'var(--muted)', marginLeft:6 }}>{lastTick}</span>
          )}
        </div>
      </div>

      {/* ── Chart area ── */}
      <div className="chart-wrap">
        {loading && (
          <div className="chart-overlay">
            <div className="spin" style={{ width:28, height:28, borderWidth:3 }} />
            <span className="chart-overlay-msg">Connecting to live stream…</span>
          </div>
        )}
        {error && !loading && <div className="chart-err-msg">{error}</div>}
        <div ref={containerRef} className="chart-container" style={{ height: 'calc(100vh - 170px)', minHeight: 400 }} />
      </div>
    </div>
  );
}


/* ── Live Signals Panel ─────────────────────────────────────────────────── */
function LiveSignalsPanel() {
  const [signals,   setSignals]   = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [filter,    setFilter]    = useState('ALL');   // ALL | BUY | SELL | WIN | LOSS | PENDING
  const [marking,   setMarking]   = useState(null);   // signal _id being marked
  const [markData,  setMarkData]  = useState({});     // {id: {outcome, exitPrice}}

  const load = useCallback(async () => {
    try {
      const r = await fetch('/signals?limit=100');
      const d = await r.json();
      setSignals(d.signals || []);
    } catch {}
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  // auto-refresh every 30s
  useEffect(() => {
    const id = setInterval(load, 30000);
    return () => clearInterval(id);
  }, [load]);

  async function handleMark(sig) {
    const md = markData[sig._id] || {};
    const outcome = md.outcome || 'WIN';
    const exitPrice = md.exitPrice ? parseFloat(md.exitPrice) : null;
    setMarking(sig._id);
    try {
      const r = await fetch(`/signals/${sig._id}/outcome`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ outcome, exit_price: exitPrice }),
      });
      if (r.ok) {
        setSignals(prev => prev.map(s =>
          s._id === sig._id ? { ...s, outcome, exit_price: exitPrice } : s
        ));
      }
    } catch {}
    setMarking(null);
  }

  function fmtTime(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
  }

  function fmtPrice(v) {
    if (v == null) return '-';
    return Number(v).toFixed(2);
  }

  const filtered = signals.filter(s => {
    if (filter === 'ALL')     return true;
    if (filter === 'BUY')     return s.direction === 'BUY';
    if (filter === 'SELL')    return s.direction === 'SELL';
    if (filter === 'WIN')     return s.outcome === 'WIN';
    if (filter === 'LOSS')    return s.outcome === 'LOSS';
    if (filter === 'PENDING') return !s.outcome;
    return true;
  });

  const counts = {
    ALL: signals.length,
    BUY: signals.filter(s => s.direction === 'BUY').length,
    SELL: signals.filter(s => s.direction === 'SELL').length,
    WIN: signals.filter(s => s.outcome === 'WIN').length,
    LOSS: signals.filter(s => s.outcome === 'LOSS').length,
    PENDING: signals.filter(s => !s.outcome).length,
  };

  const winCount  = counts.WIN;
  const lossCount = counts.LOSS;
  const closedTotal = winCount + lossCount;
  const liveWR = closedTotal > 0 ? ((winCount / closedTotal) * 100).toFixed(1) : null;

  return (
    <div className="card">
      <div className="sig-toolbar">
        <span className="sig-toolbar-title">
          Live Signals
          {liveWR !== null && (
            <span style={{ marginLeft: 10, fontWeight: 400, color: 'var(--muted)', fontSize: 12 }}>
              {winCount}W / {lossCount}L &nbsp;·&nbsp;
              <span style={{ color: parseFloat(liveWR) >= 50 ? 'var(--win)' : 'var(--loss)', fontWeight: 700 }}>
                {liveWR}% WR
              </span>
            </span>
          )}
        </span>
        {['ALL','BUY','SELL','WIN','LOSS','PENDING'].map(f => (
          <button key={f}
            className={`sig-filter-btn${filter === f ? ' active' : ''}`}
            onClick={() => setFilter(f)}>
            {f} {counts[f] > 0 ? `(${counts[f]})` : ''}
          </button>
        ))}
        <button className="sig-filter-btn" onClick={load} title="Refresh">&#8635;</button>
      </div>

      {loading ? (
        <div className="sig-empty">Loading signals…</div>
      ) : filtered.length === 0 ? (
        <div className="sig-empty">
          {signals.length === 0
            ? 'No signals yet — signals appear here once the bot generates a trade entry.'
            : `No signals match filter "${filter}".`}
        </div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <table className="sig-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Time (UTC)</th>
                <th>Dir</th>
                <th>Entry</th>
                <th>SL</th>
                <th>TP</th>
                <th>ATR</th>
                <th>Score</th>
                <th>Session</th>
                <th>Regime</th>
                <th>TG</th>
                <th>Outcome</th>
                <th>Exit</th>
                <th>Mark</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((s, i) => {
                const md = markData[s._id] || {};
                const isBusy = marking === s._id;
                return (
                  <tr key={s._id}>
                    <td style={{ color: 'var(--muted)' }}>{signals.length - signals.indexOf(s)}</td>
                    <td style={{ whiteSpace: 'nowrap', color: 'var(--muted)', fontSize: 11 }}>{fmtTime(s.sent_at)}</td>
                    <td className={s.direction === 'BUY' ? 'sig-dir-buy' : 'sig-dir-sell'}>{s.direction}</td>
                    <td><strong>{fmtPrice(s.entry_price)}</strong></td>
                    <td style={{ color: 'var(--loss)' }}>{fmtPrice(s.stop_loss)}</td>
                    <td style={{ color: 'var(--win)' }}>{fmtPrice(s.take_profit)}</td>
                    <td style={{ color: 'var(--muted)' }}>{fmtPrice(s.atr)}</td>
                    <td>{s.score}/{s.score_threshold}</td>
                    <td><span className="badge badge-gray" style={{ fontSize: 10 }}>{s.session}</span></td>
                    <td style={{ color: 'var(--muted)', fontSize: 11 }}>{s.market_regime}</td>
                    <td>
                      {s.telegram_sent
                        ? <span className="sig-tg-sent" title="Telegram sent">&#10003;</span>
                        : <span className="sig-tg-fail" title="Not sent">&#8212;</span>}
                    </td>
                    <td>
                      {s.outcome === 'WIN'  && <span className="sig-outcome-win">WIN</span>}
                      {s.outcome === 'LOSS' && <span className="sig-outcome-loss">LOSS</span>}
                      {s.outcome === 'BREAKEVEN' && <span className="sig-outcome-be">BE</span>}
                      {!s.outcome && <span className="sig-outcome-none">Pending</span>}
                    </td>
                    <td style={{ color: 'var(--muted)' }}>{fmtPrice(s.exit_price)}</td>
                    <td>
                      {!s.outcome && (
                        <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexWrap: 'wrap' }}>
                          <select
                            style={{ fontSize: 10, background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 4px' }}
                            value={md.outcome || 'WIN'}
                            onChange={e => setMarkData(prev => ({ ...prev, [s._id]: { ...md, outcome: e.target.value } }))}>
                            <option>WIN</option>
                            <option>LOSS</option>
                            <option>BREAKEVEN</option>
                          </select>
                          <input
                            type="number"
                            placeholder="Exit $"
                            style={{ width: 70, fontSize: 10, background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 5px' }}
                            value={md.exitPrice || ''}
                            onChange={e => setMarkData(prev => ({ ...prev, [s._id]: { ...md, exitPrice: e.target.value } }))}
                          />
                          <button className="sig-mark-btn" onClick={() => handleMark(s)} disabled={isBusy}>
                            {isBusy ? '…' : 'Save'}
                          </button>
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

            {/* ── Backtest Tab ── */}
            {activeTab === 'backtest' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <BacktestPanel onBacktestComplete={handleBacktestComplete} initialResult={backtestResult} />
                <BacktestHistoryPanel onLoad={handleHistoryLoad} />
                <TradeHistoryPanel backtestResult={backtestResult} />
              </div>
            )}

            {/* ── Live Signals Tab ── */}
            {activeTab === 'signals' && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <LiveSignalsPanel />
              </div>
            )}

          </main>
        )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
