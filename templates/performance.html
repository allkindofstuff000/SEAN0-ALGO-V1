{% extends "base.html" %}
{% block content %}
<section class="panel card">
    <h2>Performance</h2>
    <div class="metrics">
        <div class="metric"><span>Win Rate</span><strong>{{ perf.win_rate_percent }}%</strong></div>
        <div class="metric"><span>Total Signals</span><strong>{{ perf.total_signals }}</strong></div>
        <div class="metric"><span>Wins</span><strong>{{ perf.wins }}</strong></div>
        <div class="metric"><span>Losses</span><strong>{{ perf.losses }}</strong></div>
        <div class="metric"><span>Consecutive Losses</span><strong>{{ loss.consecutive_losses }}</strong></div>
    </div>
</section>

<section class="panel card">
    <h2>Loss Controls</h2>
    <form method="post" action="/reset-loss" onsubmit="return confirm('Reset consecutive losses to zero?');">
        <button type="submit" class="btn danger">Reset Consecutive Losses</button>
    </form>
</section>
{% endblock %}
