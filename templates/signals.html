{% extends "base.html" %}
{% block content %}
<section class="panel card">
    <h2>Last 20 Signals</h2>
    <div class="table-wrap">
        <table class="data-table">
            <thead>
            <tr>
                {% if signals %}
                    {% for col in signals[0].keys() %}
                        <th>{{ col }}</th>
                    {% endfor %}
                {% else %}
                    <th>No signal data available</th>
                {% endif %}
            </tr>
            </thead>
            <tbody>
            {% for row in signals %}
                <tr>
                    {% for value in row.values() %}
                        <td>{{ value }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
